        function toggleLanguage() { lang = lang === 'tr' ? 'en' : 'tr'; localStorage.setItem('stokpro_lang', lang); updateSidebar(); refreshCurrentView(); }

            const modal = document.getElementById('modal-container');

                        <li><b class="text-slate-900">🔍 Sayım Filtreleri:</b> Envanter sayım modülüne İsim/SKU bazlı arama ve Lokasyon bazlı daraltma filtreleri eklendi.</li>

        // --- VERİTABANI ---
        const db = new Dexie("StokPro_TamSurum");
        db.version(14).stores({ 
            kategoriler: 'id, isim, depo, oda, raf', 
            urunler: 'id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData, isSet, setLinkleri, foto, tel, alis, satis, durum, vergi, vergiOrani, maliyetDetay, aciklama, *koliler', 
            hareketler: 'id, urunId, urunIsim, sku, tip, miktar, tarih, aciklama',
            giderler: 'id, tip, baslik, tutar, tarih, notlar',
            kisiler: 'id, isim, email, tel, dogum, departman, notlar',
            sayimlar: 'id, tarih, baslik'
        });

        function generateId() { return Date.now() + Math.floor(Math.random() * 1000000); }
        let html5QrCode = null;
        function stopScanner() { if (html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode = null); } catch (e) {} } }
        
        function calculateSktDiff(sktString) { 
            if(!sktString || sktString.trim() === '') return null; 
            let normalized = sktString.replace(/[\/\.]/g, '-').trim(); let parts = normalized.split('-'); 
            let year, month, day = 1;
            if (parts.length === 2) { if (parts[0].length === 4) { year = parts[0]; month = parts[1]; } else { month = parts[0]; year = parts[1]; } } 
            else if (parts.length === 3) { if (parts[0].length === 4) { year = parts[0]; month = parts[1]; day = parts[2]; } else { day = parts[0]; month = parts[1]; year = parts[2]; } } 
            else { return null; }
            const sktDate = new Date(year, month-1, day); 
            if(isNaN(sktDate.getTime())) return null;
            const bugun = new Date(); bugun.setHours(0,0,0,0); 
            return Math.ceil((sktDate - bugun) / 86400000); 
        }

        async function checkNotifications() {
            const kisiler = await db.kisiler.toArray(); let hasAlert = false;
            const todayStr = new Date().toISOString().split('T')[0].substring(5); 
            kisiler.forEach(k => { if(k.dogum && k.dogum.endsWith(todayStr)) hasAlert = true; });
            const bell = document.getElementById('bellIcon'); if(bell) { if(hasAlert) bell.classList.remove('hidden'); else bell.classList.add('hidden'); } return hasAlert;
        }

        function otomatikDurum(stokDegeri) {
            const select = document.getElementById('uDurum'); if(!select) return;
            if(parseInt(stokDegeri) <= 0) { select.value = 'Envanterde Değil'; select.classList.add('bg-red-50', 'text-red-700', 'font-bold'); } 
            else { select.value = 'Envanterde'; select.classList.remove('bg-red-50', 'text-red-700', 'font-bold'); }
        }

        // --- DASHBOARD ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0) && u.durum !== 'Envanterde Değil');
            let totalCost = 0; let totalSalesValue = 0; let alertHtml = ''; let alertCount = 0;

            urunler.forEach(u => {
                if(u.durum !== 'Envanterde Değil' && u.stok > 0) { totalCost += (parseFloat(u.alis) || 0) * u.stok; totalSalesValue += (parseFloat(u.satis) || 0) * u.stok; }
                if(u.durum !== 'Envanterde Değil') {
                    const fark = calculateSktDiff(u.skt);
                    if(fark !== null) {
                        if(fark < 0) { alertCount++; alertHtml += `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold uppercase block text-red-600">${t('expired')}</span></div><span class="material-icons text-red-500">error</span></div>`; } 
                        else if(fark >= 0 && fark <= 30) { alertCount++; alertHtml += `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold block text-yellow-700">SKT: ${fark} ${t('daysLeft')}</span></div><span class="material-icons text-yellow-600">warning</span></div>`; }
                    }
                    if(u.koliler && u.koliler.length > 0) {
                        u.koliler.forEach((koli, index) => {
                            if(koli.miktar > 0) {
                                const kFark = calculateSktDiff(koli.skt);
                                if(kFark !== null) {
                                    if(kFark < 0) { alertCount++; alertHtml += `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim} (P${index+1})</b><span class="text-xs font-bold uppercase block text-red-600">${t('expiredBatch')}</span></div><span class="material-icons text-red-500">error</span></div>`; }
                                    else if(kFark >= 0 && kFark <= 30) { alertCount++; alertHtml += `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim} (P${index+1})</b><span class="text-xs font-bold block text-yellow-700">${t('batchExpiring')}: ${kFark} ${t('daysLeft')}</span></div><span class="material-icons text-yellow-600">warning</span></div>`; }
                                }
                            }
                        });
                    }

        async function sayimiKaydet() {
            let hasError = false; let changes = [];
            document.querySelectorAll('.sayim-row').forEach(row => {
                let urunId = parseInt(row.dataset.id); let urunIsim = row.dataset.isim; let eskiStok = parseInt(row.dataset.stok); let sku = row.dataset.sku; let inputStr = document.getElementById(`sy_${urunId}`).value;
                if(inputStr !== "") {
                    let yeniStok = parseInt(inputStr); let fark = yeniStok - eskiStok;
                    if(fark !== 0) {
                        let aciklama = document.getElementById(`sa_${urunId}`).value.trim();
                        if(!aciklama) { row.classList.add('bg-red-100'); hasError = true; } 
                        else { row.classList.remove('bg-red-100'); changes.push({urunId, urunIsim, sku, eskiStok, yeniStok, fark, aciklama}); }
                    }
                }
            });
            if(hasError) return alert(t('countErrReason'));
            if(changes.length === 0) return alert(t('countErrNoChange'));
            const baslik = document.getElementById('sayimBaslik').value.trim() || `Sayım - ${new Date().toLocaleDateString()}`;
            if(!confirm(`${changes.length} ${t('countConfirmMsg')}`)) return;

            let hareketEkle = []; let sayimOzet = [];
            for (let c of changes) {
                let u = await db.urunler.get(c.urunId); if(!u) continue;
                u.stok = c.yeniStok; u.durum = u.stok <= 0 ? 'Envanterde Değil' : 'Envanterde';
                await db.urunler.update(u.id, {stok: u.stok, durum: u.durum});
                let tip = c.fark > 0 ? 'Sayım Fazlası' : 'Sayım Eksiği';
                hareketEkle.push({ id: generateId()+Math.random(), urunId: u.id, urunIsim: u.isim, sku: u.sku, tip: tip, miktar: Math.abs(c.fark), tarih: new Date().toLocaleString(), aciklama: c.aciklama });
                sayimOzet.push(c);
            }
            if(hareketEkle.length > 0) await db.hareketler.bulkPut(hareketEkle);
            await db.sayimlar.put({ id: generateId(), tarih: new Date().toLocaleString(), baslik: baslik, farkOzet: sayimOzet });
            triggerAutoSync(); document.getElementById('sayimModal').remove(); renderMuhasebe(); alert(t('countSuccess'));
        }

        async function editKoli(urunId, index) {
            const urun = await db.urunler.get(urunId); if(!urun || !urun.koliler) return; const koli = urun.koliler[index];
            const newQty = prompt(`Parti ${index+1} miktar:`, koli.miktar); if(newQty === null) return;
            const newDate = prompt(`Parti ${index+1} SKT (YYYY-MM-DD):`, koli.skt || ''); if(newDate === null) return;
            
            let fark = parseInt(newQty) - koli.miktar;
            urun.koliler[index].miktar = parseInt(newQty); urun.koliler[index].skt = newDate;
            urun.stok += fark; urun.durum = urun.stok <= 0 ? 'Envanterde Değil' : 'Envanterde';
            await db.urunler.update(urunId, {koliler: urun.koliler, stok: urun.stok, durum: urun.durum}); triggerAutoSync(); showUrunDetay(urunId);
        }

        async function deleteKoli(urunId, index) {
            if(!confirm("Emin misiniz? (Miktar stoktan düşülecektir)")) return;
            const urun = await db.urunler.get(urunId); if(!urun || !urun.koliler) return; const koli = urun.koliler[index];
            urun.stok -= koli.miktar; urun.durum = urun.stok <= 0 ? 'Envanterde Değil' : 'Envanterde'; urun.koliler.splice(index, 1);
            await db.urunler.update(urunId, {koliler: urun.koliler, stok: urun.stok, durum: urun.durum}); triggerAutoSync(); showUrunDetay(urunId);
        }

        async function stokIslemiKoli(urunId, koliIndex, tip) {
            const miktarStr = prompt(`Parti ${koliIndex+1} üzerinden ${tip} yapılacak miktar:`, "1"); if(miktarStr === null) return;
            const miktar = parseInt(miktarStr); if(isNaN(miktar) || miktar <= 0) return;
            
            const urun = await db.urunler.get(urunId); if(!urun || !urun.koliler) return; const koli = urun.koliler[koliIndex];
            if(tip === 'Çıkış' && koli.miktar < miktar) return alert("Bu partide belirtilen miktarda stok bulunmuyor!");
            
            koli.miktar = tip === 'Giriş' ? koli.miktar + miktar : koli.miktar - miktar;
            urun.stok = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar;
            urun.durum = urun.stok <= 0 ? 'Envanterde Değil' : 'Envanterde';
            
            await db.urunler.update(urunId, {stok: urun.stok, durum: urun.durum, koliler: urun.koliler});
            await db.hareketler.put({ id: generateId(), urunId: urun.id, urunIsim: urun.isim + ` (Parti ${koliIndex+1})`, sku: urun.sku, tip: tip, miktar: miktar, tarih: new Date().toLocaleString() });
            triggerAutoSync(); showUrunDetay(urunId);
        }

        async function stokIslemi(urunId, tip) {
            const miktar = parseInt(document.getElementById('islemMiktar').value); if(isNaN(miktar) || miktar <= 0) return;
            const urun = await db.urunler.get(urunId); let ns = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar; if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok!");
            let otoDurum = ns <= 0 ? 'Envanterde Değil' : 'Envanterde'; await db.urunler.update(urunId, {stok: ns, durum: otoDurum}); await db.hareketler.put({ id: generateId(), urunId: urun.id, urunIsim: urun.isim, sku: urun.sku, tip: tip, miktar: miktar, tarih: new Date().toLocaleString() });
            triggerAutoSync(); showUrunDetay(urunId);
        }

        async function stokIslemiSetten(altUrunId, tip, anaUrunId) {
            const miktarInput = document.getElementById(`setMiktar-${altUrunId}`); if(!miktarInput) return; const miktar = parseInt(miktarInput.value); if(isNaN(miktar) || miktar <= 0) return;
            const altUrun = await db.urunler.get(altUrunId); let ns = tip === 'Giriş' ? altUrun.stok + miktar : altUrun.stok - miktar; if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok!");
            let otoDurum = ns <= 0 ? 'Envanterde Değil' : 'Envanterde'; await db.urunler.update(altUrunId, {stok: ns, durum: otoDurum}); await db.hareketler.put({ id: generateId(), urunId: altUrun.id, urunIsim: altUrun.isim + " (Set)", sku: altUrun.sku, tip: tip, miktar: miktar, tarih: new Date().toLocaleString() }); triggerAutoSync(); showUrunDetay(anaUrunId);
        }

        function startHost() {
            if(!myDeviceName) return alert("Cihaz adı girmelisiniz!"); if(peer) peer.destroy(); isHost = true; connections = []; connectedPeersInfo = []; currentHostId = "";
            const hostId = "stok-" + Math.floor(1000 + Math.random() * 9000); document.getElementById('btnHost').innerHTML = '...';
            peer = new Peer(hostId, { config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]} });
            peer.on('open', (id) => { currentHostId = id; renderYedekleme(); });
            peer.on('connection', (conn) => { connections.push(conn); setupConnectionEvents(conn); updateSyncUI(); });
            peer.on('error', (err) => { alert(`Ağ Hatası / Network Error: ${err.type}\n\nDetay: ${err.message}`); disconnectNetwork(); });

        function connectToHost() {
            if(!myDeviceName) return alert("Cihaz adı girmelisiniz!"); const tid = document.getElementById('syncInput').value.trim(); if(!tid) return;

            peer = new Peer({ config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]} }); 
            peer.on('open', () => { let conn = peer.connect(tid, { reliable: true }); connections = [conn]; setupConnectionEvents(conn); renderYedekleme(); });
            peer.on('error', (err) => { alert(`Ağ Hatası / Network Error: ${err.type}\n\nDetay: ${err.message}`); disconnectNetwork(); });
        }
        function setupConnectionEvents(conn) {
            conn.syncStatus = 'ediliyor'; conn.on('open', () => { conn.send({ type: 'HANDSHAKE', name: myDeviceName }); triggerAutoSync(); });
            conn.on('data', async (data) => {
                if(data.type === 'HANDSHAKE') { if(isHost && connections.length > 4) { conn.send({ type: 'REJECT', msg: 'Maksimum 5 cihaz sınırı!' }); setTimeout(() => conn.close(), 500); return; } conn.peerName = data.name; conn.syncStatus = 'ediliyor'; if(isHost) broadcastPeerList(); else updateSyncUI(); }
                else if(data.type === 'REJECT') { alert(data.msg); disconnectNetwork(); } else if (data.type === 'PEER_LIST') { connectedPeersInfo = data.peers; updateSyncUI(); }
                else if(data.type === 'SYNC') {
                    try { conn.syncStatus = 'ediliyor'; if(isHost) broadcastPeerList(); else updateSyncUI();
                        if(data.u && data.u.length) await db.urunler.bulkPut(data.u); if(data.c && data.c.length) await db.kategoriler.bulkPut(data.c); if(data.h && data.h.length) await db.hareketler.bulkPut(data.h); if(data.g && data.g.length) await db.giderler.bulkPut(data.g); if(data.k && data.k.length) await db.kisiler.bulkPut(data.k); if(data.s && data.s.length) await db.sayimlar.bulkPut(data.s);
                        refreshCurrentView(); conn.syncStatus = 'edildi'; conn.send({ type: 'SYNC_OK' }); 
                        if (isHost) { broadcast({ type: 'SYNC', u: data.u, c: data.c, h: data.h, g: data.g, k: data.k, s: data.s }, conn.peer); broadcastPeerList(); } else { updateSyncUI(); }
                    } catch(e) { conn.syncStatus = 'edilmedi'; conn.send({ type: 'SYNC_ERR' }); if(isHost) broadcastPeerList(); else updateSyncUI(); }
                }
                else if (data.type === 'SYNC_OK') { conn.syncStatus = 'edildi'; if(isHost) broadcastPeerList(); else updateSyncUI(); } else if (data.type === 'SYNC_ERR') { conn.syncStatus = 'edilmedi'; if(isHost) broadcastPeerList(); else updateSyncUI(); }
            });
            conn.on('close', () => { connections = connections.filter(c => c.peer !== conn.peer); updateSyncUI(); if(isHost) broadcastPeerList(); });
        }
        function broadcastPeerList() { const peers = [{ name: myDeviceName, status: 'edildi' }]; connections.forEach(c => { if(c.open && c.peerName) { peers.push({ name: c.peerName, status: c.syncStatus || 'ediliyor' }); } }); connectedPeersInfo = peers; broadcast({ type: 'PEER_LIST', peers: peers }); updateSyncUI(); }

        async function refreshCurrentView() { const pageTitle = document.getElementById('pageTitle'); if(!pageTitle) { renderDashboard(); return; } const page = pageTitle.dataset.page; if(page === 'inv') await renderEnvanter(); if(page === 'dash') await renderDashboard(); if(page === 'cat') await renderKategoriler(); if(page === 'back') await renderYedekleme(); if(page === 'acc') await renderMuhasebe(); if(page === 'tools') await renderTools(); }
        async function sistemiSifirla() { const pass = prompt("Format Password (0000):"); if (pass === "0000") { if (confirm("Emin misiniz? / Are you sure?")) { await db.delete(); window.location.reload(); } } else if (pass !== null) { alert("Hatalı şifre! / Wrong password!"); } }
        async function renderTarayici() { stopScanner(); document.getElementById('content').innerHTML = `<div class="max-w-xl mx-auto"><h2 class="text-3xl font-bold text-slate-800 mb-6 flex items-center justify-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> ${t('scan')}</h2><div class="card text-center p-8 bg-slate-900 border-0 shadow-2xl"><div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden mb-4 min-h-[300px]"></div><div id="result" class="mb-6 font-bold text-blue-400 h-6 animate-pulse">Kameraya tutun...</div><button onclick="renderDashboard()" class="btn bg-red-600 text-white w-full py-3 hover:bg-red-500 shadow-lg">Kapat / Close</button></div></div>`; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, async (text) => { stopScanner(); document.getElementById('result').innerText = "Yönlendiriliyor..."; if (text.startsWith("cat_")) { showKategoriUrunleri(parseInt(text.replace("cat_", ""))); return; } let urun = await db.urunler.where("qrData").equals(text).first() || await db.urunler.where("sku").equals(text).first() || await db.urunler.where("sku").equals(text.replace("SKU-", "")).first(); if (urun) showUrunDetay(urun.id); else { alert("Sistemde bulunamadı:\n" + text); renderTarayici(); } }).catch(() => { document.getElementById('result').innerText = "Kamera erişim hatası!"; }); }

        updateSidebar(); renderDashboard(); checkNotifications();
    </script>
</body>
</html>
