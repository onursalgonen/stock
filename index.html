<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Stok Pro (V.39) - Onursal Gönen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- PeerJS: Cihazdan Cihaza Senkronizasyon Kütüphanesi -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* %100 iPad Uyumlu Özel Print Motoru ve 2x2 cm QR ayarı */
        @media print {
            body * { visibility: hidden !important; }
            #print-engine, #print-engine * { visibility: visible !important; }
            #print-engine { position: absolute; left: 0; top: 0; width: 100vw; display: flex; flex-wrap: wrap; gap: 15px; padding: 10px; background: white; z-index: 99999; }
            .qr-item { width: 30%; text-align: center; border: 1px solid #000; padding: 15px; border-radius: 8px; page-break-inside: avoid; break-inside: avoid; margin-bottom: 10px; }
            .qr-item p { margin: 5px 0 0 0; font-size: 14px; font-weight: bold; }
            .qr-item span { font-size: 12px; color: #555; }
        }
        
        /* 2x2 cm Sabit QR Kutusu */
        .qr-2x2 { width: 2cm !important; height: 2cm !important; display: flex; align-items: center; justify-content: center; overflow: hidden; background: white; }
        .qr-2x2 img, .qr-2x2 canvas { width: 100% !important; height: 100% !important; object-fit: contain; }

        body { background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 1.5rem; border: 1px solid #e2e8f0; }
        .btn { transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
        .hidden-force { display: none !important; }
    </style>
</head>
<body class="font-sans">
    
    <div id="app-container" class="flex h-screen w-full">
        <!-- Modern Sol Menü -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10 relative shrink-0">
            <div class="p-6 border-b border-slate-700 mb-4 cursor-pointer hover:bg-slate-800 transition" onclick="showChangelog()">
                <h1 class="font-bold text-2xl text-white tracking-wide">Stok<span class="text-blue-500">Pro</span></h1>
                <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-bold">V.39 Ultimate Sync <span class="text-slate-400 font-normal">Onursal Gönen</span></p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <button onclick="renderDashboard()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">dashboard</span> <span id="m-dash">Dashboard</span></button>
                <button onclick="renderKategoriler()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">domain</span> <span id="m-cat">Lokasyonlar</span></button>
                <button onclick="renderEnvanter()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">inventory_2</span> <span id="m-inv">Envanter</span></button>
                <button onclick="renderYedekleme()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">backup</span> <span id="m-back">Veri Merkezi</span></button>
                
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <button onclick="renderTarayici()" class="w-full flex items-center p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-lg shadow-lg shadow-blue-900/20 transition"><span class="material-icons mr-3">qr_code_scanner</span> <span id="m-scan">QR / Barkod</span></button>
                </div>
                
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <button onclick="toggleLang()" class="w-full flex items-center justify-center p-3 bg-slate-800 text-white hover:bg-slate-700 rounded-lg transition"><span class="material-icons mr-2">language</span> <span id="m-lang">EN / TR</span></button>
                </div>
            </nav>
        </aside>

        <!-- İçerik Alanı -->
        <main class="flex-1 p-8 overflow-y-auto relative" id="content"></main>
    </div>

    <!-- Güçlendirilmiş Print Motoru -->
    <div id="print-engine" class="hidden-force"></div>
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4"></div>

    <script>
        // --- DİL VE PARA BİRİMİ ALTYAPISI ---
        let lang = localStorage.getItem('stokProLang') || 'TR';
        
        const i18n = {
            TR: { 
                dash: "Genel Bakış", cat: "Lokasyonlar", inv: "Envanter", back: "Veri Merkezi", scan: "Barkod / QR Tara", langTxt: "Switch to English", 
                totalProd: "Kayıtlı Ürün", critStock: "Kritik Stok Uyarısı", history: "Son Stok Hareketleri", alert: "Acil Durumlar", 
                newProd: "Yeni Ürün Ekle", printAll: "Seçili/Tüm QR Yazdır", setTag: "SET", setContents: "Set İçeriği", 
                exp: "Sistemi Dışa Aktar", imp: "Excel / Yedek Yükle", shareBtn: "Paylaş", photo: "Fotoğraf", tel: "Tel Numarası", status: "Ürün Durumu", 
                inInv: "Envanterde", notInInv: "Envanterde Değil", buy: "Alış Maliyeti", sell: "Satış Fiyatı", tax: "Vergi", 
                loc: "Lokasyon", totCost: "Toplam Envanter Maliyeti", totSales: "Tahmini Satış Değeri", hideOut: "Envanter Dışı Ürünleri Göster",
                searchPlaceholder: "İsim veya Barkod ara..."
            },
            EN: { 
                dash: "Dashboard", cat: "Locations", inv: "Inventory", back: "Data Center", scan: "Scan Barcode/QR", langTxt: "Türkçeye Geç", 
                totalProd: "Registered Items", critStock: "Critical Stock", history: "Recent Activity", alert: "Alerts", 
                newProd: "Add Product", printAll: "Print Selected/All", setTag: "SET", setContents: "Set Contents", 
                exp: "Export System", imp: "Import Excel / Backup", shareBtn: "Share", photo: "Photo", tel: "Phone Number", status: "Status", 
                inInv: "In Inventory", notInInv: "Out of Stock", buy: "Purchase Cost", sell: "Sale Price", tax: "Tax", 
                loc: "Location", totCost: "Total Inventory Cost", totSales: "Est. Sales Value", hideOut: "Show Out of Stock Items",
                searchPlaceholder: "Search name or barcode..."
            }
        };
        const t = (key) => i18n[lang][key];
        const curr = () => lang === 'EN' ? '$' : '₺';

        function toggleLang() {
            lang = lang === 'TR' ? 'EN' : 'TR';
            localStorage.setItem('stokProLang', lang);
            updateMenuText();
            if(document.getElementById('pageTitle')) {
                const title = document.getElementById('pageTitle').dataset.page;
                if(title === 'dash') renderDashboard();
                if(title === 'cat') renderKategoriler();
                if(title === 'inv') renderEnvanter();
                if(title === 'back') renderYedekleme();
            }
        }

        function updateMenuText() {
            document.getElementById('m-dash').innerText = t('dash');
            document.getElementById('m-cat').innerText = t('cat');
            document.getElementById('m-inv').innerText = t('inv');
            document.getElementById('m-back').innerText = t('back');
            document.getElementById('m-scan').innerText = t('scan');
            document.getElementById('m-lang').innerText = t('langTxt');
        }

        function showChangelog() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full">
                    <h2 class="text-2xl font-bold text-blue-600 mb-4 border-b pb-2">V.39 Ultimate Yenilikleri</h2>
                    <ul class="space-y-2 text-slate-700 text-sm mb-6">
                        <li><b class="text-slate-900">🔗 Sorunsuz Canlı P2P Ağ:</b> V38'in donmayan mimarisi üzerine cihazlar arası senkronizasyon BulkPut teknolojisi ile sisteme dahil edildi. UI kilitlenmesi tarihe karıştı!</li>
                        <li><b class="text-slate-900">🛡️ Debounce Filtreleme:</b> Arama yaparken yaşanan takılmalar engellendi.</li>
                        <li><b class="text-slate-900">📏 2x2 cm QR Kodlar:</b> Tüm ürünler ve lokasyonlar tam 2x2 cm ölçüsünde QR üretir.</li>
                        <li><b class="text-slate-900">📝 Ürün Açıklamaları:</b> İlaç ve kritik ürün detayları için özel açıklama alanı eklendi.</li>
                        <li><b class="text-slate-900">🚨 Şifreli Güvenlik & Sayaç:</b> Acil durum bildirim sayacı aktif ve veritabanı sıfırlama 0000 şifresine bağlandı.</li>
                    </ul>
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="w-full btn bg-slate-800 text-white">Kapat</button>
                </div>`;
            modal.classList.remove('hidden');
        }

        // --- VERİTABANI ---
        const db = new Dexie("StokPro_TamSurum");
        db.version(8).stores({ 
            kategoriler: '++id, isim, depo, oda, raf', 
            urunler: '++id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData, isSet, setLinkleri, foto, tel, alis, satis, durum, vergi, aciklama', 
            hareketler: '++id, urunId, urunIsim, tip, miktar, tarih' 
        });

        let html5QrCode = null;
        function stopScanner() { if (html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode = null); } catch (e) {} } }
        function calculateSktDiff(sktString) { if(!sktString) return null; const parts = sktString.split('-'); const sktDate = new Date(parts[0], parts[1]-1, parts[2]); const bugun = new Date(); bugun.setHours(0,0,0,0); return Math.ceil((sktDate - bugun) / (1000 * 60 * 60 * 24)); }

        function otomatikDurum(stokDegeri) {
            const select = document.getElementById('uDurum');
            if(!select) return;
            if(parseInt(stokDegeri) <= 0) {
                select.value = 'Envanterde Değil';
                select.classList.add('bg-red-50', 'text-red-700', 'font-bold');
            } else {
                select.value = 'Envanterde';
                select.classList.remove('bg-red-50', 'text-red-700', 'font-bold');
            }
        }

        // --- DASHBOARD ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const cats = await db.kategoriler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0) && u.durum !== 'Envanterde Değil');
            
            let totalCost = 0; let totalSalesValue = 0;
            let alertHtml = ''; let alertCount = 0;

            const getLokasyonMetni = (katId) => {
                const k = cats.find(c => c.id === katId);
                return k ? `${k.isim} (${k.depo||'-'}/${k.oda||'-'})` : t('loc')+' Yok';
            };

            urunler.forEach(u => {
                if(u.durum !== 'Envanterde Değil' && u.stok > 0) {
                    totalCost += (parseFloat(u.alis) || 0) * u.stok;
                    totalSalesValue += (parseFloat(u.satis) || 0) * u.stok;
                }
                
                if(u.durum !== 'Envanterde Değil') {
                    const fark = calculateSktDiff(u.skt);
                    const uLoc = getLokasyonMetni(u.katId);
                    if(fark !== null) {
                        if(fark < 0) {
                            alertCount++;
                            alertHtml += `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold uppercase block text-red-600">SKT GEÇTİ!</span><span class="text-[10px] text-red-700 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons text-red-500">error</span></div>`;
                        } else if(fark >= 0 && fark <= 30) {
                            alertCount++;
                            alertHtml += `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold block text-yellow-700">SKT: ${fark} gün kaldı</span><span class="text-[10px] text-yellow-800 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons text-yellow-600">warning</span></div>`;
                        }
                    }
                }
            });

            kritikStok.forEach(u => {
                alertCount++;
                const uLoc = getLokasyonMetni(u.katId);
                alertHtml += `<div class="p-3 bg-orange-100 border border-orange-200 text-orange-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs block">Düşük Stok (Mevcut: ${u.stok} / Sınır: ${u.kritikSeviye})</span><span class="text-[10px] text-orange-700 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons">chevron_right</span></div>`;
            });
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 id="pageTitle" data-page="dash" class="text-3xl font-bold text-slate-800">${t('dash')}</h2></div>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="card border-l-4 border-blue-500 p-4 flex flex-col justify-center">
                        <p class="text-slate-500 font-medium text-xs md:text-sm mb-1">${t('totalProd')}</p>
                        <h3 class="text-2xl font-bold text-slate-800">${urunler.length}</h3>
                    </div>
                    <div class="card border-l-4 border-red-500 p-4 flex flex-col justify-center cursor-pointer hover:bg-red-50 transition" onclick="renderEnvanter('', true)">
                        <p class="text-slate-500 font-medium text-xs md:text-sm mb-1">${t('critStock')}</p>
                        <h3 class="text-2xl font-bold text-red-600 flex items-center">${kritikStok.length} <span class="material-icons text-sm ml-2">launch</span></h3>
                    </div>
                    <div class="card border-l-4 border-green-500 p-4 flex flex-col justify-center bg-green-50/50">
                        <p class="text-slate-500 font-medium text-xs md:text-sm mb-1">${t('totCost')}</p>
                        <h3 class="text-xl font-bold text-green-700">${totalCost.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2})} ${curr()}</h3>
                    </div>
                    <div class="card border-l-4 border-purple-500 p-4 flex flex-col justify-center bg-purple-50/50">
                        <p class="text-slate-500 font-medium text-xs md:text-sm mb-1">${t('totSales')}</p>
                        <h3 class="text-xl font-bold text-purple-700">${totalSalesValue.toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2})} ${curr()}</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="card">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-slate-400">history</span> ${t('history')}</h3>
                        ${hareketler.length === 0 ? '<p class="text-slate-500 text-sm italic">-</p>' : `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead><tr class="text-slate-400 border-b"><th class="pb-2">Tarih</th><th class="pb-2">İşlem / Ürün & Lokasyon</th></tr></thead>
                                <tbody>
                                    ${hareketler.map(h => {
                                        const hUrun = urunler.find(ur => ur.id === h.urunId);
                                        const locString = hUrun ? getLokasyonMetni(hUrun.katId) : 'Silinmiş Ürün';
                                        return `
                                        <tr class="border-b last:border-0 hover:bg-slate-50">
                                            <td class="py-3 text-slate-500 align-top">${h.tarih.split(' ')[0]}<br><span class="text-[10px]">${h.tarih.split(' ')[1]}</span></td>
                                            <td class="py-3">
                                                <div class="font-semibold text-slate-700">${h.urunIsim} <span class="ml-2 font-bold ${h.tip === 'Giriş' ? 'text-green-600' : 'text-red-600'}">${h.tip === 'Giriş' ? '+' : '-'}${h.miktar}</span></div>
                                                <div class="text-[11px] text-slate-400 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span> ${locString}</div>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>`}
                    </div>
                    <div class="card bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center">
                            <span class="material-icons mr-2 text-yellow-500">notifications_active</span> 
                            ${t('alert')} 
                            ${alertCount > 0 ? `<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-2 shadow">${alertCount}</span>` : ''}
                        </h3>
                        <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                            ${alertHtml || '<p class="text-slate-500 text-sm italic">Şu an için acil bir durum yok.</p>'}
                        </div>
                    </div>
                </div>`;
        }

        // --- LOKASYON / KATEGORİ MODÜLÜ ---
        async function renderKategoriler() {
            stopScanner();
            const cats = await db.kategoriler.toArray();
            const urunler = await db.urunler.toArray();
            
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 id="pageTitle" data-page="cat" class="text-3xl font-bold text-slate-800">${t('cat')}</h2>
                    <div class="space-x-2 flex items-center flex-wrap gap-y-2">
                        <button onclick="printSecilenKat()" class="btn bg-slate-800 text-white hover:bg-slate-700" title="Seçilenleri / Tümünü Yazdır"><span class="material-icons">print</span></button>
                        <button onclick="silSecilenKat()" class="btn bg-red-600 text-white hover:bg-red-500" title="Seçilenleri Sil"><span class="material-icons">delete</span></button>
                        <div class="hidden md:block h-8 w-px bg-slate-300 mx-2"></div>
                        <button onclick="showKatForm()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-1">add</span> Yeni</button>
                    </div>
                </div>
                <div id="katGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>`;
            
            setTimeout(() => {
                cats.forEach(c => {
                    const uCount = urunler.filter(u => u.katId === c.id).length;
                    const div = document.createElement('div');
                    div.className = "card text-center hover:border-blue-300 transition duration-300 flex flex-col items-center relative";
                    div.innerHTML = `
                        <input type="checkbox" class="kat-checkbox absolute top-4 left-4 w-5 h-5 cursor-pointer accent-blue-600" data-id="${c.id}">
                        <h3 class="font-bold text-lg text-slate-700 mb-2 mt-6">${c.isim}</h3>
                        <p class="text-xs text-slate-500 mb-2">D:${c.depo||'-'} | O:${c.oda||'-'} | R:${c.raf||'-'}</p>
                        <p class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full mb-4">${uCount} Ürün Bağlı</p>
                        <div class="mb-6 p-2 bg-slate-50 border rounded shadow-sm inline-block">
                            <div id="qr-kat-${c.id}" class="qr-2x2"></div>
                        </div>
                        <div class="flex justify-center space-x-2 mt-auto w-full border-t pt-4">
                            <button onclick="showKategoriUrunleri(${c.id})" class="btn bg-blue-50 text-blue-600 p-2"><span class="material-icons">visibility</span></button>
                            <button onclick="showKatForm(${c.id})" class="btn bg-yellow-50 text-yellow-600 p-2"><span class="material-icons">edit</span></button>
                        </div>`;
                    document.getElementById('katGrid').appendChild(div);
                    new QRCode(document.getElementById(`qr-kat-${c.id}`), {text: "cat_"+c.id, width: 75, height: 75});
                });
            }, 50);
        }

        async function printSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            let hedefCats = secilenler.length > 0 ? await db.kategoriler.where('id').anyOf(secilenler).toArray() : await db.kategoriler.toArray(); 
            if (hedefCats.length === 0) return alert("Yazdırılacak lokasyon yok.");
            
            const printEngine = document.getElementById('print-engine');
            printEngine.innerHTML = hedefCats.map(c => `
                <div class="qr-item">
                    <div style="display:flex; justify-content:center;">
                        <div id="pq-kat-${c.id}" class="qr-2x2"></div>
                    </div>
                    <p>${c.isim}</p>
                    <span>${c.depo||'-'}/${c.oda||'-'}</span>
                </div>`).join('');
            
            printEngine.classList.remove('hidden-force');
            
            setTimeout(() => { 
                hedefCats.forEach(c => new QRCode(document.getElementById(`pq-kat-${c.id}`), {text: "cat_"+c.id, width: 75, height: 75})); 
                setTimeout(() => { window.print(); printEngine.classList.add('hidden-force'); printEngine.innerHTML = ''; }, 500);
            }, 100);
        }

        async function silSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            if (secilenler.length === 0) return alert("Lütfen silmek için en az bir lokasyon seçin!");
            if(confirm(secilenler.length + " adet lokasyonu silmek istediğinize emin misiniz?")) {
                await db.kategoriler.bulkDelete(secilenler); triggerAutoSync(); renderKategoriler();
            }
        }

        async function showKatForm(id = null) {
            const k = id ? await db.kategoriler.get(id) : {isim: '', depo: '', oda: '', raf: ''};
            const modal = document.createElement('div'); modal.id = 'tempModal';
            modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center border-b pb-4"><span class="material-icons mr-2 text-blue-600">domain</span> ${id ? 'Lokasyon Düzenle' : 'Yeni Lokasyon'}</h2>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold text-slate-600 mb-2">Kategori / İsmi *</label><input id="kIsim" value="${k.isim}" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>

        async function updateEnvanterTable() {
            let filtre = document.getElementById('searchInput').value;
            let showOut = document.getElementById('showOutOfStock').checked;
            
            let isCriticalSearch = filtre === "[KRİTİK]";
            if(isCriticalSearch) filtre = ""; 
            
            const urunler = await db.urunler.toArray();
            let liste = urunler.filter(u => u.isim.toLowerCase().includes(filtre.toLowerCase()) || (u.sku && u.sku.toLowerCase().includes(filtre.toLowerCase())));
            
            if(isCriticalSearch) liste = liste.filter(u => u.stok <= (u.kritikSeviye || 0) && u.durum !== 'Envanterde Değil');
            if(!showOut && !isCriticalSearch) liste = liste.filter(u => u.durum !== 'Envanterde Değil');
            
            const tbody = document.getElementById('envanterTbody');
            if(!tbody) return; 
            
            tbody.innerHTML = liste.map(u => {
                const k = globalKategoriler.find(c => c.id === u.katId);
                const locName = k ? k.isim : 'Belirtilmedi';
                
                return `
                <tr class="border-b last:border-0 hover:bg-slate-50 transition ${u.durum === 'Envanterde Değil' ? 'opacity-50 grayscale' : ''}">

        }

        function toggleAllUrunler(source) { document.querySelectorAll('.urun-checkbox').forEach(cb => cb.checked = source.checked); }

        async function printSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id));
            let hedefUrunler = secilenler.length > 0 ? await db.urunler.where('id').anyOf(secilenler).toArray() : await db.urunler.toArray();
            if(hedefUrunler.length === 0) return alert("Yazdırılacak ürün bulunamadı!");
            
            const printEngine = document.getElementById('print-engine');
            printEngine.innerHTML = hedefUrunler.map(u => `
                <div class="qr-item">
                    <div style="display:flex; justify-content:center; margin-bottom:5px;">
                        <div id="pq-urun-${u.id}" class="qr-2x2"></div>
                    </div>
                    <p>${u.isim}</p><span>SKU: ${u.sku}</span>
                </div>`).join('');
            
            printEngine.classList.remove('hidden-force');
            
            setTimeout(() => { 
                hedefUrunler.forEach(u => new QRCode(document.getElementById(`pq-urun-${u.id}`), {text: u.qrData, width: 75, height: 75})); 
                setTimeout(() => { window.print(); printEngine.classList.add('hidden-force'); printEngine.innerHTML = ''; }, 500);
            }, 100);
        }

        async function silSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id));
            if (secilenler.length === 0) return alert("Lütfen silmek için listeden en az bir ürün seçin!");
            if(confirm(secilenler.length + " adet ürünü silmek istediğinize emin misiniz?")) {
                await db.urunler.bulkDelete(secilenler); triggerAutoSync(); renderEnvanter();
            }
        }

        function scanForForm() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `

                    <h3 class="text-white font-bold mb-4">Barkodunuzu Okutun</h3>

                    <button onclick="closeFormScanner()" class="btn bg-red-600 text-white w-full">İptal Et</button>
                </div>`;
            modal.classList.remove('hidden');

            html5QrCode = new Html5Qrcode("form-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, (text) => {
                document.getElementById('uSku').value = text.replace("SKU-", "");
                closeFormScanner();
            }).catch(() => { alert("Kamera açılamadı!"); closeFormScanner(); });
        }
        function closeFormScanner() { if (html5QrCode) { html5QrCode.stop().then(() => html5QrCode = null).catch(()=>{}); } document.getElementById('modal-container').classList.add('hidden'); }

        function previewPhoto(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('foto-preview').src = e.target.result;
                document.getElementById('uFotoBase64').value = e.target.result;
                document.getElementById('foto-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
        function removePhoto() { document.getElementById('foto-preview').src = ""; document.getElementById('uFotoBase64').value = ""; document.getElementById('foto-preview-container').classList.add('hidden'); }

        async function kaydetUrun() {
            const skuVal = document.getElementById('uSku').value.trim();
            if(!skuVal) return alert("Barkod/SKU Zorunludur!");
            const qrSafe = skuVal.startsWith("SKU-") ? skuVal : "SKU-" + skuVal;
            
            await db.urunler.add({

        async function stokIslemi(urunId, tip) {
            const miktar = parseInt(document.getElementById('islemMiktar').value);
            if(isNaN(miktar) || miktar <= 0) return;
            const urun = await db.urunler.get(urunId);
            let ns = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok! En fazla " + urun.stok + " adet çıkış yapabilirsiniz.");
            
            let otoDurum = ns <= 0 ? 'Envanterde Değil' : 'Envanterde';
            await db.urunler.update(urunId, {stok: ns, durum: otoDurum});
            await db.hareketler.add({ urunId: urun.id, urunIsim: urun.isim, tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            triggerAutoSync(); showUrunDetay(urunId);
        }

        async function stokIslemiSetten(altUrunId, tip, anaUrunId) {
            const miktarInput = document.getElementById(`setMiktar-${altUrunId}`);
            if(!miktarInput) return;
            const miktar = parseInt(miktarInput.value);
            if(isNaN(miktar) || miktar <= 0) return alert("Geçerli bir miktar girin!");
            const altUrun = await db.urunler.get(altUrunId);
            let ns = tip === 'Giriş' ? altUrun.stok + miktar : altUrun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Alt üründe yetersiz stok!");
            
            let otoDurum = ns <= 0 ? 'Envanterde Değil' : 'Envanterde';
            await db.urunler.update(altUrunId, {stok: ns, durum: otoDurum});
            await db.hareketler.add({ urunId: altUrun.id, urunIsim: altUrun.isim + " (Set Üzerinden)", tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            triggerAutoSync(); showUrunDetay(anaUrunId);
        }

        function startHost() {
            if(peer) peer.destroy();
            const hostId = "stok-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('btnHost').innerHTML = 'Başlatılıyor...';
            peer = new Peer(hostId);
            peer.on('open', (id) => {
                document.getElementById('btnHost').innerHTML = 'Sunucu Ol & Bağlantı Kodu Üret';
                document.getElementById('hostCodeText').innerText = id;
                setSyncStatus("Bağlantı Bekleniyor...", "wait");
            });
            peer.on('connection', (c) => { conn = c; setupConnection(); });
        }

        function connectToHost() {
            const tid = document.getElementById('syncInput').value.trim();
            if(!tid) return alert("Lütfen kod girin!");
            if(peer) peer.destroy();
            document.getElementById('btnConn').innerHTML = 'Bağlanıyor...';
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(tid);
                conn.on('open', () => setupConnection());
                conn.on('error', () => { alert("Bağlantı hatası!"); document.getElementById('btnConn').innerHTML = 'Koda Bağlan & Eşleş'; });
            });
        }

        function setupConnection() {
            if(document.getElementById('btnConn')) document.getElementById('btnConn').innerHTML = 'Bağlandı';
            setSyncStatus("Bağlandı! Oto-Senkronizasyon Aktif.", "ok");
            
            conn.on('data', async (data) => {
                if(data.type === 'SYNC') {
                    try {
                        // BulkPut - UI donmasını ve kilitlenmeyi engeller
                        if(data.u && data.u.length) await db.urunler.bulkPut(data.u);
                        if(data.c && data.c.length) await db.kategoriler.bulkPut(data.c);
                        if(data.h && data.h.length) await db.hareketler.bulkPut(data.h);
                        
                        // Veriler senkronize oldu, eğer o anda ekranda liste varsa tazele
                        refreshCurrentView();
                    } catch(e) { console.error("Sync Error", e); }
                }
            });

            triggerAutoSync();
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => triggerAutoSync(), 60000); // 1 dk'da bir
        }

        async function triggerAutoSync() {
            if(conn && conn.open) {
                const u = await db.urunler.toArray(); 
                const c = await db.kategoriler.toArray(); 
                const h = await db.hareketler.toArray();
                conn.send({ type: 'SYNC', u, c, h });
            }
        }

        function setSyncStatus(text, type) {
            const div = document.getElementById('syncStatusDiv');
            if(!div) return;
            if(type === 'wait') {
                div.className = "mt-4 p-3 rounded-lg text-center font-bold flex items-center justify-center bg-orange-100 text-orange-800 border border-orange-200";
                div.innerHTML = `<span class="material-icons mr-2">wifi_tethering</span> ${text}`;
            } else if(type === 'ok') {
                div.className = "mt-4 p-3 rounded-lg text-center font-bold flex items-center justify-center bg-green-100 text-green-800 border border-green-200";
                div.innerHTML = `<span class="material-icons mr-2">check_circle</span> ${text}`;
            } else {
                div.className = "mt-4 p-3 rounded-lg text-center font-bold flex items-center justify-center bg-slate-200 text-slate-600 border border-slate-300";
                div.innerHTML = `<span class="material-icons mr-2">sync_disabled</span> ${text}`;
            }
        }

        async function refreshCurrentView() {
            const pageTitle = document.getElementById('pageTitle');
            if(!pageTitle) return;
            const page = pageTitle.dataset.page;
            if(page === 'inv') await updateEnvanterTable();
            if(page === 'dash') await renderDashboard();

        async function sistemiSifirla() {
            const pass = prompt("Sistemi sıfırlamak için şifreyi girin (İpucu: 0000):");
            if (pass === "0000") {
                if (confirm("DİKKAT: Her şey kalıcı olarak silinecek. Emin misiniz?")) {
                    await db.delete(); alert("Sistem sıfırlandı."); window.location.reload();
                }
            } else if (pass !== null) { alert("Hatalı şifre!"); }
        }

        async function yedekAl() {
            try {
                const u = await db.urunler.toArray(); const c = await db.kategoriler.toArray(); const h = await db.hareketler.toArray();
                for(let item of u) { item.tip = 'urun'; }
                for(let item of c) { item.tip = 'kategori'; }
                for(let item of h) { item.tip = 'hareket'; }

                const data = [...u, ...c, ...h];
                if(data.length === 0) return alert("Veri bulunamadı!");
                
                const wb = XLSX.utils.book_new(); 
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "StokYedek");
                
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement("a");
                a.href = url;
                a.download = "StokPro_V39_Yedek.xlsx";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch(err) { alert("Yedek alınırken hata oluştu."); }
        }

        async function yedekYukle() {
            const file = document.getElementById('imp').files[0];
            if(!file) return alert("Lütfen bir Excel dosyası seçin!");
            
            const btn = document.getElementById('btnYukle');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-icons animate-spin mr-2">refresh</span> İşleniyor...';
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    
                    let targetSheet = workbook.SheetNames[0];
                    if (workbook.SheetNames.includes("MANUEL ENTRY")) targetSheet = "MANUEL ENTRY";
                    
                    const worksheet = workbook.Sheets[targetSheet];
                    const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

                    if (!json || json.length === 0) { btn.innerHTML = originalText; btn.disabled = false; return; }

                    if (targetSheet === "MANUEL ENTRY" || json[0].hasOwnProperty('Sales Description')) {
                        let kat = await db.kategoriler.where('isim').equals('Genel Envanter').first();
                        if (!kat) {
                            await db.kategoriler.add({ isim: 'Genel Envanter', depo: 'Ana Depo', oda: 'Excel Aktarımı', raf: '-' });
                            kat = await db.kategoriler.where('isim').equals('Genel Envanter').first();
                        }
                        
                        let uEkle = [];
                        for(let i of json) {
                            let isim = i['Sales Description'];
                            if(!isim || isim.toString().trim() === '') continue; 
                            let sku = i['SKU'] ? String(i['SKU']) : Math.floor(10000000 + Math.random() * 90000000).toString();
                            let stok = parseInt(i['ON HAND']) || 0;
                            let durum = stok <= 0 ? 'Envanterde Değil' : 'Envanterde';
                            
                            let mevcut = await db.urunler.where('sku').equals(sku).first();
                            if(mevcut) {
                                mevcut.stok = stok; mevcut.alis = parseFloat(i['COST']) || mevcut.alis; mevcut.satis = parseFloat(i['SALES PRICE']) || mevcut.satis; mevcut.durum = durum;
                                uEkle.push(mevcut);
                            } else {
                                uEkle.push({ 
                                    katId: kat.id, isim: String(isim), sku: sku, stok: stok, skt: '', adres: 'Excel', kritikSeviye: 0, 
                                    qrData: "SKU-"+sku, isSet: false, setLinkleri: '', foto: '', tel: '', alis: parseFloat(i['COST']) || 0, satis: parseFloat(i['SALES PRICE']) || 0, 
                                    durum: durum, vergi: false, aciklama: ''
                                });
                            }
                        }
                        if(uEkle.length) await db.urunler.bulkPut(uEkle);
                    } else {
                        let uE = [], kE = [], hE = [];
                        json.forEach(i => {
                            if(i.tip === 'urun') { delete i.tip; uE.push(i); }
                            else if(i.tip === 'kategori') { delete i.tip; kE.push(i); }
                            else if(i.tip === 'hareket') { delete i.tip; hE.push(i); }
                        });
                        if(uE.length) await db.urunler.bulkPut(uE);
                        if(kE.length) await db.kategoriler.bulkPut(kE);
                        if(hE.length) await db.hareketler.bulkPut(hE);
                    }
                    
                    triggerAutoSync();
                    alert("Veriler Başarıyla Yüklendi!");
                    renderEnvanter();
                } catch(err) { btn.innerHTML = originalText; btn.disabled = false; }
            }; 
            reader.readAsArrayBuffer(file);
        }

        // --- AKILLI KAMERA ---
        async function renderTarayici() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="max-w-xl mx-auto">
                    <h2 class="text-3xl font-bold text-slate-800 mb-6 flex items-center justify-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> Barkod / QR Okuyucu</h2>
                    <div class="card text-center p-8 bg-slate-900 border-0 shadow-2xl">
                        <div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden mb-4 min-h-[300px]"></div>
                        <div id="result" class="mb-6 font-bold text-blue-400 h-6 animate-pulse">Kameraya tutun...</div>
                        <button onclick="renderDashboard()" class="btn bg-red-600 text-white w-full py-3 hover:bg-red-500 shadow-lg">Kamerayı Kapat</button>
                    </div>
                </div>`;
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, async (text) => {
                stopScanner(); 
                document.getElementById('result').innerText = "Yönlendiriliyor...";
                if (text.startsWith("cat_")) { showKategoriUrunleri(parseInt(text.replace("cat_", ""))); return; }
                
                let urun = await db.urunler.where("qrData").equals(text).first();
                if (!urun) urun = await db.urunler.where("sku").equals(text).first();
                if (!urun) urun = await db.urunler.where("sku").equals(text.replace("SKU-", "")).first();

                if (urun) showUrunDetay(urun.id); else { alert("Bulunamadı:\n" + text); renderTarayici(); }
            }).catch(() => {});
        }

        updateMenuText();
        renderDashboard();
    </script>
</body>
