<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Stok Pro Final (V.33) - Onursal Gönen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* %100 iPad ve iOS Uyumlu Print Katmanı */
        @media print { 
            @page { margin: 10mm; }
            body { background-color: #fff !important; margin: 0; padding: 0; }
            #app-container, .no-print { display: none !important; } 
            #printArea { display: flex !important; flex-wrap: wrap; justify-content: space-between; width: 100%; gap: 15px; }
            .qr-item { width: 30%; text-align: center; border: 1px solid #aaa; padding: 15px; border-radius: 8px; page-break-inside: avoid; break-inside: avoid; margin-bottom: 10px; }
            .qr-item p { margin: 5px 0 0 0; font-size: 14px; font-weight: bold; }
            .qr-item span { font-size: 12px; color: #555; }
        }
        body { background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 1.5rem; border: 1px solid #e2e8f0; }
        .btn { transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="font-sans">
    
    <!-- Uygulama Ana Katmanı -->
    <div id="app-container" class="flex h-screen w-full">
        <!-- Modern Sol Menü -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10 relative shrink-0">
            <div class="p-6 border-b border-slate-700 mb-4 cursor-pointer hover:bg-slate-800 transition" onclick="showChangelog()">
                <h1 class="font-bold text-2xl text-white tracking-wide">Stok<span class="text-blue-500">Pro</span></h1>
                <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-bold">V.33 Final <span class="text-slate-400 font-normal">Onursal Gönen</span></p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
                <button onclick="renderDashboard()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">dashboard</span> <span id="m-dash">Dashboard</span></button>
                <button onclick="renderKategoriler()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">domain</span> <span id="m-cat">Lokasyonlar</span></button>
                <button onclick="renderEnvanter()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">inventory_2</span> <span id="m-inv">Envanter</span></button>
                <button onclick="renderYedekleme()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">backup</span> <span id="m-back">Yedekleme</span></button>
                
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <button onclick="renderTarayici()" class="w-full flex items-center p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-lg shadow-lg shadow-blue-900/20 transition"><span class="material-icons mr-3">qr_code_scanner</span> <span id="m-scan">Barkod / QR Tara</span></button>
                </div>
                
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <button onclick="toggleLang()" class="w-full flex items-center justify-center p-3 bg-slate-800 text-white hover:bg-slate-700 rounded-lg transition"><span class="material-icons mr-2">language</span> <span id="m-lang">EN / TR</span></button>
                </div>
            </nav>
        </aside>

        <!-- İçerik Alanı -->
        <main class="flex-1 p-8 overflow-y-auto relative" id="content"></main>
    </div>

    <!-- Sadece Yazdırma Esnasında Görünecek Katman -->
    <div id="printArea" class="hidden"></div>

    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4"></div>

    <script>
        // --- DİL ALTYAPISI ---
        let lang = localStorage.getItem('stokProLang') || 'TR';
        
        const i18n = {
            TR: { dash: "Genel Bakış", cat: "Lokasyonlar", inv: "Envanter", back: "Yedekleme Merkezi", scan: "Barkod / QR Tara", langTxt: "Switch to English", totalProd: "Toplam Ürün/Set", critStock: "Kritik Stok Uyarısı", history: "Son Stok Hareketleri", alert: "Acil Durumlar (SKT & Stok)", newProd: "Yeni Ürün Ekle", printAll: "Seçili/Tüm QR Yazdır", setTag: "SET", setContents: "Set İçeriği (Alt Ürünler)", exp: "Dışa Aktar", imp: "İçe Aktar (Kurtarma)", shareBtn: "Paylaş (Email/Drive)", photo: "Fotoğraf", tel: "Tel Numarası", status: "Ürün Durumu", inInv: "Envanterde", notInInv: "Envanterde Değil", buy: "Alış Fiyatı", sell: "Satış Fiyatı / Rate", tax: "Vergilendirme" },
            EN: { dash: "Dashboard", cat: "Locations", inv: "Inventory", back: "Backup Center", scan: "Scan Barcode/QR", langTxt: "Türkçeye Geç", totalProd: "Total Products", critStock: "Critical Stock", history: "Recent Activity", alert: "Alerts (EXP & Stock)", newProd: "Add Product", printAll: "Print All QR", setTag: "SET", setContents: "Set Contents (Sub-items)", exp: "Export Data", imp: "Import (Restore)", shareBtn: "Share (Email/Drive)", photo: "Photo", tel: "Phone Number", status: "Status", inInv: "In Inventory", notInInv: "Not In Inventory", buy: "Purchase Price", sell: "Sale Price / Rate", tax: "Taxable" }
        };
        const t = (key) => i18n[lang][key];

        function toggleLang() {
            lang = lang === 'TR' ? 'EN' : 'TR';
            localStorage.setItem('stokProLang', lang);
            updateMenuText();
            if(document.getElementById('pageTitle')) {
                const title = document.getElementById('pageTitle').dataset.page;
                if(title === 'dash') renderDashboard();
                if(title === 'cat') renderKategoriler();
                if(title === 'inv') renderEnvanter();
                if(title === 'back') renderYedekleme();
            }
        }

        function updateMenuText() {
            document.getElementById('m-dash').innerText = t('dash');
            document.getElementById('m-cat').innerText = t('cat');
            document.getElementById('m-inv').innerText = t('inv');
            document.getElementById('m-back').innerText = t('back');
            document.getElementById('m-scan').innerText = t('scan');
            document.getElementById('m-lang').innerText = t('langTxt');
        }

        function showChangelog() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full">
                    <h2 class="text-2xl font-bold text-blue-600 mb-4 border-b pb-2">V.33 Yenilikleri</h2>
                    <ul class="space-y-3 text-slate-700 text-sm mb-6">
                        <li><b class="text-slate-900">📍 Dashboard Lokasyon Bilgisi:</b> Acil durum uyarılarında ve son hareketlerde ürünün bulunduğu Depo/Oda/Raf/Kategori bilgisi artık gösteriliyor.</li>
                        <li><b class="text-slate-900">📇 Standart Barkod Desteği:</b> Sistem artık sadece QR kod değil, piyasadaki klasik ürün barkodlarını da (1D çizgili) tarayıp tanıyabiliyor.</li>
                    </ul>
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="w-full btn bg-slate-800 text-white">Kapat</button>
                </div>`;
            modal.classList.remove('hidden');
        }

        // --- VERİTABANI ---
        const db = new Dexie("StokPro_TamSurum");
        db.version(5).stores({ 
            kategoriler: '++id, isim, depo, oda, raf', 
            urunler: '++id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData, isSet, setLinkleri, foto, tel, alis, satis, durum, vergi', 
            hareketler: '++id, urunId, urunIsim, tip, miktar, tarih' 
        });

        let html5QrCode = null;
        function stopScanner() { if (html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode = null); } catch (e) {} } }
        function getQrBase64(text) { return new Promise(resolve => { if(!text) return resolve(""); const div = document.createElement('div'); new QRCode(div, { text: text, width: 128, height: 128 }); setTimeout(() => { const canvas = div.querySelector('canvas'); resolve(canvas ? canvas.toDataURL('image/png') : ""); }, 50); }); }
        function calculateSktDiff(sktString) { if(!sktString) return null; const parts = sktString.split('-'); const sktDate = new Date(parts[0], parts[1]-1, parts[2]); const bugun = new Date(); bugun.setHours(0,0,0,0); return Math.ceil((sktDate - bugun) / (1000 * 60 * 60 * 24)); }

        // --- DASHBOARD (Lokasyon Bilgisi Eklendi) ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const cats = await db.kategoriler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0));
            
            // Lokasyon bulucu yardımcı fonksiyon
            const getLokasyonMetni = (katId) => {
                const k = cats.find(c => c.id === katId);
                return k ? `${k.isim} (${k.depo||'-'}/${k.oda||'-'}/${k.raf||'-'})` : 'Bilinmeyen Lokasyon';
            };
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 id="pageTitle" data-page="dash" class="text-3xl font-bold text-slate-800">${t('dash')}</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="card border-l-4 border-blue-500 flex items-center">
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-full mr-4"><span class="material-icons text-3xl">inventory</span></div>
                        <div><p class="text-slate-500 font-medium">${t('totalProd')}</p><h3 class="text-3xl font-bold text-slate-800">${urunler.length}</h3></div>
                    </div>
                    <div class="card border-l-4 border-red-500 flex items-center cursor-pointer" onclick="renderEnvanter()">
                        <div class="p-4 bg-red-50 text-red-600 rounded-full mr-4"><span class="material-icons text-3xl">warning</span></div>
                        <div><p class="text-slate-500 font-medium">${t('critStock')}</p><h3 class="text-3xl font-bold text-red-600">${kritikStok.length}</h3></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="card">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-slate-400">history</span> ${t('history')}</h3>
                        ${hareketler.length === 0 ? '<p class="text-slate-500 text-sm italic">-</p>' : `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead><tr class="text-slate-400 border-b"><th class="pb-2">Tarih</th><th class="pb-2">İşlem / Ürün & Lokasyon</th></tr></thead>
                                <tbody>
                                    ${hareketler.map(h => {
                                        const hUrun = urunler.find(ur => ur.id === h.urunId);
                                        const locString = hUrun ? getLokasyonMetni(hUrun.katId) : 'Silinmiş Ürün';
                                        return `
                                        <tr class="border-b last:border-0 hover:bg-slate-50">
                                            <td class="py-3 text-slate-500 align-top">${h.tarih.split(' ')[0]}<br><span class="text-[10px]">${h.tarih.split(' ')[1]}</span></td>
                                            <td class="py-3">
                                                <div class="font-semibold text-slate-700">${h.urunIsim} <span class="ml-2 font-bold ${h.tip === 'Giriş' ? 'text-green-600' : 'text-red-600'}">${h.tip === 'Giriş' ? '+' : '-'}${h.miktar}</span></div>
                                                <div class="text-[11px] text-slate-400 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span> ${locString}</div>
                                            </td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>`}
                    </div>
                    <div class="card bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-yellow-500">notifications_active</span> ${t('alert')}</h3>
                        <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                            ${urunler.map(u => {
                                const fark = calculateSktDiff(u.skt);
                                const uLoc = getLokasyonMetni(u.katId);
                                if(fark === null) return '';
                                if(fark < 0) return `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold uppercase block text-red-600">SKT GEÇTİ!</span><span class="text-[10px] text-red-700 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons text-red-500">error</span></div>`;
                                if(fark >= 0 && fark <= 30) return `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold block text-yellow-700">SKT: ${fark} gün kaldı</span><span class="text-[10px] text-yellow-800 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons text-yellow-600">warning</span></div>`;
                                return '';
                            }).join('')}
                            ${kritikStok.map(u => {
                                const uLoc = getLokasyonMetni(u.katId);
                                return `<div class="p-3 bg-orange-100 border border-orange-200 text-orange-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs block">Düşük Stok (Mevcut: ${u.stok} / Sınır: ${u.kritikSeviye})</span><span class="text-[10px] text-orange-700 flex items-center mt-1"><span class="material-icons text-[12px] mr-1">place</span>${uLoc}</span></div><span class="material-icons">chevron_right</span></div>`
                            }).join('')}
                        </div>
                    </div>
                </div>`;
        }

        // --- LOKASYON / KATEGORİ MODÜLÜ ---
        async function renderKategoriler() {
            stopScanner();
            const cats = await db.kategoriler.toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 id="pageTitle" data-page="cat" class="text-3xl font-bold text-slate-800">${t('cat')}</h2>
                    <div class="space-x-2 flex items-center flex-wrap gap-y-2">
                        <button onclick="printSecilenKat()" class="btn bg-slate-800 text-white hover:bg-slate-700" title="Seçilenleri / Tümünü Yazdır"><span class="material-icons">print</span></button>
                        <button onclick="silSecilenKat()" class="btn bg-red-600 text-white hover:bg-red-500" title="Seçilenleri Sil"><span class="material-icons">delete</span></button>
                        <div class="hidden md:block h-8 w-px bg-slate-300 mx-2"></div>
                        <button onclick="showKatForm()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-1">add</span> Yeni</button>
                    </div>
                </div>
                <div id="katGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>`;
            
            setTimeout(() => {
                cats.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "card text-center hover:border-blue-300 transition duration-300 flex flex-col items-center relative";
                    div.innerHTML = `
                        <input type="checkbox" class="kat-checkbox absolute top-4 left-4 w-5 h-5 cursor-pointer accent-blue-600" data-id="${c.id}">
                        <h3 class="font-bold text-lg text-slate-700 mb-2 mt-6">${c.isim}</h3>
                        <p class="text-xs text-slate-500 mb-4">D:${c.depo||'-'} | O:${c.oda||'-'} | R:${c.raf||'-'}</p>
                        <div id="qr-kat-${c.id}" class="mb-6 p-2 bg-white border rounded shadow-sm"></div>
                        <div class="flex justify-center space-x-2 mt-auto w-full border-t pt-4">
                            <button onclick="showKategoriUrunleri(${c.id})" class="btn bg-blue-50 text-blue-600 p-2"><span class="material-icons">visibility</span></button>
                            <button onclick="showKatForm(${c.id})" class="btn bg-yellow-50 text-yellow-600 p-2"><span class="material-icons">edit</span></button>
                        </div>`;
                    document.getElementById('katGrid').appendChild(div);
                    new QRCode(document.getElementById(`qr-kat-${c.id}`), {text: "cat_"+c.id, width: 80, height: 80});
                });
            }, 50);
        }

        async function printSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            let hedefCats = [];
            if (secilenler.length > 0) { hedefCats = await db.kategoriler.where('id').anyOf(secilenler).toArray(); } 
            else { hedefCats = await db.kategoriler.toArray(); }
            if (hedefCats.length === 0) return alert("Yazdırılacak lokasyon yok.");
            
            document.getElementById('printArea').innerHTML = hedefCats.map(c => `
                <div class="qr-item">
                    <div id="pq-kat-${c.id}" style="display:flex; justify-content:center;"></div>
                    <p>${c.isim}</p>
                    <span>${c.depo||'-'}/${c.oda||'-'}</span>
                </div>`).join('');
            
            setTimeout(() => { 
                hedefCats.forEach(c => new QRCode(document.getElementById(`pq-kat-${c.id}`), {text: "cat_"+c.id, width: 100, height: 100})); 
                document.getElementById('content').innerHTML = `
                    <div class="mb-8 flex flex-col md:flex-row gap-4 bg-blue-50 p-6 rounded-2xl border border-blue-100 items-center justify-between shadow-sm">
                        <div>
                            <h3 class="text-xl font-bold text-blue-900 mb-1">🖨️ Yazdırma Önizlemesi</h3>
                            <p class="text-sm text-blue-700">Lütfen bekleyin, QR Kodlar hazırlandığında yazdırabilirsiniz.</p>
                        </div>
                        <div class="flex gap-4 w-full md:w-auto">
                            <button onclick="renderKategoriler()" class="btn bg-white border border-slate-300 text-slate-700 flex-1 md:flex-none py-3 px-6"><span class="material-icons mr-2">arrow_back</span> İPTAL</button>
                            <button onclick="window.print()" class="btn bg-blue-600 text-white flex-1 md:flex-none py-3 px-8 shadow-lg shadow-blue-500/30"><span class="material-icons mr-2">print</span> ŞİMDİ YAZDIR</button>
                        </div>
                    </div>`;
            }, 50);
        }

        async function silSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            if (secilenler.length === 0) return alert("Lütfen silmek için en az bir lokasyon seçin!");
            if(confirm(secilenler.length + " adet lokasyonu silmek istediğinize emin misiniz?")) {
                await db.kategoriler.bulkDelete(secilenler); renderKategoriler();
            }
        }

        async function showKatForm(id = null) {
            const k = id ? await db.kategoriler.get(id) : {isim: '', depo: '', oda: '', raf: ''};
            const modal = document.createElement('div'); modal.id = 'tempModal';
            modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center border-b pb-4"><span class="material-icons mr-2 text-blue-600">domain</span> ${id ? 'Lokasyon Düzenle' : 'Yeni Lokasyon'}</h2>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-blue-500">category</span> Kategori / İsmi *</label><input id="kIsim" value="${k.isim}" placeholder="Örn: Elektronik Parçalar" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">warehouse</span> Depo Adı / No</label><input id="kDepo" value="${k.depo}" placeholder="Örn: Ana Depo" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">meeting_room</span> Oda / Bölüm</label><input id="kOda" value="${k.oda}" placeholder="Örn: Bölüm A" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">layers</span> Raf Kodu</label><input id="kRaf" value="${k.raf}" placeholder="Örn: Raf-3" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                    </div>
                    <div class="flex gap-4 mt-8 pt-6 border-t border-slate-100">
                        <button onclick="document.getElementById('tempModal').remove()" class="btn bg-slate-100 text-slate-700 w-full hover:bg-slate-200">İptal</button>
                        <button onclick="kaydetKat(${id || 'null'})" class="btn bg-blue-600 text-white w-full hover:bg-blue-500">Kaydet</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        }

        async function kaydetKat(id) {
            const isim = document.getElementById('kIsim').value;
            if(!isim) return alert("İsim zorunlu!");
            const data = { isim, depo: document.getElementById('kDepo').value, oda: document.getElementById('kOda').value, raf: document.getElementById('kRaf').value };
            if(id) await db.kategoriler.update(id, data); else await db.kategoriler.add(data);
            document.getElementById('tempModal').remove();
            renderKategoriler();
        }

        async function showKategoriUrunleri(katId) {
            stopScanner();
            const kat = await db.kategoriler.get(katId);
            const urunler = await db.urunler.where({katId: katId}).toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-6">
                    <button onclick="renderKategoriler()" class="mr-4 text-slate-500 hover:text-blue-600"><span class="material-icons text-3xl">arrow_back</span></button>
                    <h2 class="text-2xl font-bold text-slate-800">📂 ${kat.isim} Ürünleri</h2>
                </div>
                <div class="card overflow-hidden">
                    <table class="w-full text-left">

        async function updateEnvanterTable(filtre) {
            const urunler = await db.urunler.toArray();
            const liste = urunler.filter(u => u.isim.toLowerCase().includes(filtre.toLowerCase()) || (u.sku && u.sku.toLowerCase().includes(filtre.toLowerCase())));
            
            const tbody = document.getElementById('envanterTbody');
            if(!tbody) return; 
            
            tbody.innerHTML = liste.map(u => `
                <tr class="border-b last:border-0 hover:bg-slate-50 transition ${u.durum === 'Envanterde Değil' ? 'opacity-70' : ''}">
                    <td class="p-4"><input type="checkbox" class="urun-checkbox w-5 h-5 cursor-pointer accent-blue-600" data-id="${u.id}"></td>
                    <td class="p-4 w-24">
                        <div class="flex flex-col items-center gap-2">
                            ${u.foto ? `<img src="${u.foto}" class="w-10 h-10 object-cover rounded shadow">` : ''}
                            <div id="qr-urun-${u.id}" class="bg-white p-1 border rounded inline-block"></div>
                        </div>
                    </td>
                    <td class="p-4 cursor-pointer" onclick="showUrunDetay(${u.id})">
                        <p class="font-bold text-slate-800 text-base">${u.isim} 
                            ${u.isSet ? `<span class="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded ml-1">${t('setTag')}</span>` : ''}
                            ${u.durum === 'Envanterde Değil' ? `<span class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded ml-1">Dışı</span>` : ''}
                        </p>
                        <p class="text-xs text-slate-400">SKU: ${u.sku}</p>
                    </td>
                    <td class="p-4 text-sm text-slate-600">
                        <p><span class="font-bold text-slate-500">Satış:</span> ${u.satis || '-'} ₺</p>
                        <p><span class="font-bold text-slate-500">Vergi:</span> ${u.vergi ? 'Evet' : 'Hayır'}</p>
                    </td>
                    <td class="p-4 text-center"><span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${u.stok <= u.kritikSeviye ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-700'}">${u.stok}</span></td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick="showUrunForm(${u.id})" class="btn bg-blue-50 text-blue-600 p-2 hover:bg-blue-100"><span class="material-icons">edit</span></button>
                    </td>
                </tr>`).join('');
                
            setTimeout(() => { liste.forEach(u => { const el = document.getElementById(`qr-urun-${u.id}`); if(el) new QRCode(el, {text: u.qrData || "SKU-" + (u.sku || ""), width: 32, height: 32}); }); }, 50);
        }

        function toggleAllUrunler(source) {
            const checkboxes = document.querySelectorAll('.urun-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }

        async function printSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id));
            let hedefUrunler = [];
            if (secilenler.length > 0) { hedefUrunler = await db.urunler.where('id').anyOf(secilenler).toArray(); } 
            else { hedefUrunler = await db.urunler.toArray(); }
            if(hedefUrunler.length === 0) return alert("Yazdırılacak ürün bulunamadı!");
            
            document.getElementById('printArea').innerHTML = hedefUrunler.map(u => `
                <div class="qr-item">
                    <div id="pq-urun-${u.id}" style="display:flex; justify-content:center; margin-bottom:5px;"></div>
                    <p>${u.isim}</p>
                    <span>SKU: ${u.sku}</span>
                </div>`).join('');
            
            setTimeout(() => { 
                hedefUrunler.forEach(u => new QRCode(document.getElementById(`pq-urun-${u.id}`), {text: u.qrData, width: 100, height: 100})); 
                document.getElementById('content').innerHTML = `
                    <div class="mb-8 flex flex-col md:flex-row gap-4 bg-blue-50 p-6 rounded-2xl border border-blue-100 items-center justify-between shadow-sm">
                        <div>
                            <h3 class="text-xl font-bold text-blue-900 mb-1">🖨️ Yazdırma Önizlemesi</h3>
                            <p class="text-sm text-blue-700">QR kodların tamamen yüklendiğinden emin olduktan sonra yazdır butonuna basın.</p>
                        </div>
                        <div class="flex gap-4 w-full md:w-auto">
                            <button onclick="renderEnvanter()" class="btn bg-white border border-slate-300 text-slate-700 flex-1 md:flex-none py-3 px-6"><span class="material-icons mr-2">arrow_back</span> İPTAL</button>
                            <button onclick="window.print()" class="btn bg-blue-600 text-white flex-1 md:flex-none py-3 px-8 shadow-lg shadow-blue-500/30"><span class="material-icons mr-2">print</span> ŞİMDİ YAZDIR</button>
                        </div>
                    </div>`;
            }, 50);
        }

        async function silSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id));
            if (secilenler.length === 0) return alert("Lütfen silmek için listeden en az bir ürün seçin!");
            if(confirm(secilenler.length + " adet ürünü envanterden silmek istediğinize emin misiniz?")) {
                await db.urunler.bulkDelete(secilenler); renderEnvanter();
            }
        }

        // Formda Barkod Tarama (1D ve 2D Desteği)
        function scanForForm() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-slate-900 rounded-xl p-6 w-full max-w-md text-center">
                    <h3 class="text-white font-bold mb-4">Ürün Barkodunu Okutun</h3>
                    <div id="form-reader" class="w-full bg-black rounded-lg overflow-hidden min-h-[250px] mb-4"></div>
                    <button onclick="closeFormScanner()" class="btn bg-red-600 text-white w-full">İptal Et</button>
                </div>`;
            modal.classList.remove('hidden');

            html5QrCode = new Html5Qrcode("form-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, (text) => {
                // Eğer kendi QR kodumuzsa "SKU-" yu temizle, değilse barkod numarasını direkt yaz (Örn: 869...123)
                document.getElementById('uSku').value = text.replace("SKU-", ""); 
                closeFormScanner();
            }).catch(() => { alert("Kamera açılamadı!"); closeFormScanner(); });
        }

        function closeFormScanner() {
            if (html5QrCode) { html5QrCode.stop().then(() => html5QrCode = null).catch(()=>{}); }
            document.getElementById('modal-container').classList.add('hidden');
        }

        function previewPhoto(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('foto-preview').src = e.target.result;
                document.getElementById('uFotoBase64').value = e.target.result;
                document.getElementById('foto-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
        function removePhoto() {
            document.getElementById('foto-preview').src = "";
            document.getElementById('uFotoBase64').value = "";
            document.getElementById('foto-preview-container').classList.add('hidden');
        }

            await db.urunler.add({ 
                katId: parseInt(document.getElementById('uKatId').value), isim: document.getElementById('uIsim').value, sku: sku, 
                stok: parseInt(document.getElementById('uStok').value), skt: document.getElementById('uSkt').value, adres: document.getElementById('uAdres').value, 
                kritikSeviye: parseInt(document.getElementById('uKritik').value) || 0, qrData: "SKU-"+sku, isSet: document.getElementById('uIsSet').checked, setLinkleri: document.getElementById('uSetLinkleri').value,
                foto: document.getElementById('uFotoBase64').value,
                tel: document.getElementById('uTel').value, alis: document.getElementById('uAlis').value, satis: document.getElementById('uSatis').value,
                durum: document.getElementById('uDurum').value, vergi: document.getElementById('uVergi').checked
            });
            renderEnvanter();
        }

        async function kaydetDuzenleme(id) {
            await db.urunler.update(id, { 
                isim: document.getElementById('uIsim').value, skt: document.getElementById('uSkt').value, adres: document.getElementById('uAdres').value, 
                kritikSeviye: parseInt(document.getElementById('uKritik').value) || 0, isSet: document.getElementById('uIsSet').checked, setLinkleri: document.getElementById('uSetLinkleri').value,
                foto: document.getElementById('uFotoBase64').value,

                durum: document.getElementById('uDurum').value, vergi: document.getElementById('uVergi').checked

            renderEnvanter();
        }

                                <div>

                                    <p class="text-xs text-slate-500">Stok: <span class="font-bold text-slate-800">${altUrun.stok}</span> | Barkod/SKU: ${s}</p>

                            <div class="flex items-center space-x-1 border rounded-lg bg-slate-50 p-1">
                                <input type="number" id="setMiktar-${altUrun.id}" value="1" min="1" class="w-12 p-1 text-center bg-transparent font-bold outline-none text-sm">
                                <button onclick="stokIslemiSetten(${altUrun.id}, 'Giriş', ${urun.id})" class="bg-green-100 text-green-700 w-8 h-8 rounded flex items-center justify-center hover:bg-green-200"><span class="material-icons text-sm">add</span></button>
                                <button onclick="stokIslemiSetten(${altUrun.id}, 'Çıkış', ${urun.id})" class="bg-red-100 text-red-700 w-8 h-8 rounded flex items-center justify-center hover:bg-red-200"><span class="material-icons text-sm">remove</span></button>
                            </div>
                        </div>`;
                    } else {
                        setHtml += `<div class="bg-gray-100 text-gray-500 p-3 rounded-lg border text-sm flex items-center"><span class="material-icons mr-2 text-gray-400">error_outline</span> ${s} (Sistemde yok)</div>`;
                    }
                }
                setHtml += `</div></div>`;
            }

            document.getElementById('content').innerHTML = `
                <div class="max-w-4xl mx-auto mb-10">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="renderEnvanter()" class="text-slate-500 hover:text-blue-600 flex items-center"><span class="material-icons mr-1">arrow_back</span> Geri Dön</button>
                        <button onclick="showUrunForm(${urun.id})" class="text-yellow-600 hover:text-yellow-700 flex items-center"><span class="material-icons mr-1">edit</span> Düzenle</button>
                    </div>
                    
                    <div class="card mb-6 p-6">
                        <div class="flex flex-col md:flex-row items-center md:items-start justify-between mb-8 pb-6 border-b gap-4">
                            <div class="flex items-center w-full md:w-auto">
                                ${urun.foto ? `<img src="${urun.foto}" class="w-24 h-24 object-cover rounded-xl shadow-md border mr-4">` : '<div class="w-24 h-24 bg-slate-100 rounded-xl border mr-4 flex items-center justify-center"><span class="material-icons text-slate-300 text-3xl">image</span></div>'}
                                <div class="flex-1">
                                    <h2 class="text-3xl font-bold text-slate-800 mb-1 flex items-center flex-wrap">${urun.isim} 
                                        ${urun.isSet ? `<span class="ml-2 bg-purple-100 text-purple-700 text-sm px-2 py-1 rounded-full align-middle shadow-sm">${t('setTag')}</span>` : ''}
                                    </h2>
                                    <p class="text-slate-500 text-sm mt-1 flex flex-wrap gap-x-4 gap-y-1">
                                        <span class="flex items-center"><span class="material-icons text-sm mr-1 text-slate-400">qr_code</span> ${urun.sku}</span> 
                                        <span class="flex items-center"><span class="material-icons text-sm mr-1 text-slate-400">domain</span> ${lokasyonMetni}</span>
                                    </p>
                                    <p class="text-slate-500 text-sm mt-1 flex flex-wrap gap-x-4 gap-y-1">
                                        <span class="flex items-center"><span class="material-icons text-sm mr-1 text-slate-400">place</span> ${urun.adres || 'Adres Yok'}</span> 
                                        <span class="flex items-center"><span class="material-icons text-sm mr-1 text-slate-400">event</span> SKT: ${urun.skt || 'Yok'}</span>
                                    </p>
                                </div>
                            </div>
                            <div class="text-center bg-slate-50 p-4 rounded-xl border min-w-[120px] shadow-sm w-full md:w-auto">
                                <p class="text-sm text-slate-500 font-bold mb-1">Mevcut Stok</p>
                                <div class="text-4xl font-black ${urun.stok <= urun.kritikSeviye ? 'text-red-600' : 'text-blue-600'}">${urun.stok}</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-center">
                                <p class="text-xs text-slate-400 font-bold mb-1 flex items-center"><span class="material-icons text-[14px] mr-1">info</span> Durum</p>
                                <p class="font-bold text-sm ${urun.durum === 'Envanterde Değil' ? 'text-red-500' : 'text-green-600'}">${urun.durum || 'Envanterde'}</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-center">
                                <p class="text-xs text-slate-400 font-bold mb-1 flex items-center"><span class="material-icons text-[14px] mr-1">payments</span> Alış / Satış</p>
                                <p class="font-bold text-sm text-slate-700">${urun.alis || '-'} ₺ / ${urun.satis || '-'} ₺</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-center">
                                <p class="text-xs text-slate-400 font-bold mb-1 flex items-center"><span class="material-icons text-[14px] mr-1">receipt_long</span> Vergi Durumu</p>
                                <p class="font-bold text-sm ${urun.vergi ? 'text-blue-600' : 'text-slate-500'}">${urun.vergi ? 'Vergiye Tabi' : 'Muaf'}</p>
                            </div>
                            <div class="bg-white p-4 rounded-xl border shadow-sm flex flex-col justify-center">
                                <p class="text-xs text-slate-400 font-bold mb-1 flex items-center"><span class="material-icons text-[14px] mr-1">phone</span> İletişim</p>
                                <p class="font-bold text-sm text-slate-700">${urun.tel || '-'}</p>
                            </div>
                        </div>

                        <div class="flex flex-wrap items-center gap-4 bg-slate-50 p-4 rounded-xl border shadow-sm">
                            <input type="number" id="islemMiktar" placeholder="Miktar..." min="1" class="flex-1 p-3 border rounded-lg text-lg font-bold text-center outline-blue-500" value="1">
                            <button onclick="stokIslemi(${urun.id}, 'Giriş')" class="btn bg-green-600 text-white px-6 py-3 hover:bg-green-500 shadow-lg shadow-green-600/30"><span class="material-icons mr-2">add_circle</span> GİRİŞ</button>
                            <button onclick="stokIslemi(${urun.id}, 'Çıkış')" class="btn bg-red-600 text-white px-6 py-3 hover:bg-red-500 shadow-lg shadow-red-600/30"><span class="material-icons mr-2">remove_circle</span> ÇIKIŞ</button>
                        </div>
                        
                        ${setHtml}
                    </div>
                </div>`;
        }

        async function stokIslemi(urunId, tip) {
            const miktar = parseInt(document.getElementById('islemMiktar').value);
            if(isNaN(miktar) || miktar <= 0) return;
            const urun = await db.urunler.get(urunId);
            let ns = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok!");
            await db.urunler.update(urunId, {stok: ns});
            await db.hareketler.add({ urunId: urun.id, urunIsim: urun.isim, tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            showUrunDetay(urunId);
        }

        async function stokIslemiSetten(altUrunId, tip, anaUrunId) {
            const miktarInput = document.getElementById(`setMiktar-${altUrunId}`);
            if(!miktarInput) return;
            const miktar = parseInt(miktarInput.value);
            if(isNaN(miktar) || miktar <= 0) return alert("Geçerli bir miktar girin!");
            const altUrun = await db.urunler.get(altUrunId);
            let ns = tip === 'Giriş' ? altUrun.stok + miktar : altUrun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Alt üründe yetersiz stok!");
            await db.urunler.update(altUrunId, {stok: ns});
            await db.hareketler.add({ urunId: altUrun.id, urunIsim: altUrun.isim + " (Set Üzerinden)", tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            showUrunDetay(anaUrunId);
        }

        // --- YEDEKLEME VE GERİ YÜKLEME ---
        async function renderYedekleme() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-8"><h2 id="pageTitle" data-page="back" class="text-3xl font-bold text-slate-800">${t('back')}</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl no-print">
                    <div class="card border-t-4 border-blue-500">
                        <div class="flex items-center mb-4"><span class="material-icons text-blue-500 text-3xl mr-3">cloud_download</span><h3 class="font-bold text-xl">${t('exp')}</h3></div>
                        <p class="text-slate-500 mb-6">Kayıtlarınızı güvenli bir Excel formatında (Fotoğraf ve QR verileri dahil) indirebilir veya paylaşabilirsiniz.</p>
                        <div class="space-y-3">
                            <button id="btnYedekAl" onclick="yedekAl(false)" class="btn bg-slate-800 text-white w-full py-3 hover:bg-slate-700"><span class="material-icons mr-2">download</span> Cihaza İndir</button>
                            <button id="btnPaylas" onclick="yedekAl(true)" class="btn bg-blue-600 text-white w-full py-3 hover:bg-blue-500 shadow-lg shadow-blue-500/30"><span class="material-icons mr-2">share</span> ${t('shareBtn')}</button>
                        </div>
                    </div>
                    <div class="card border-t-4 border-green-500">
                        <div class="flex items-center mb-4"><span class="material-icons text-green-500 text-3xl mr-3">cloud_upload</span><h3 class="font-bold text-xl">${t('imp')}</h3></div>
                        <input type="file" id="imp" class="mb-4 block w-full border p-3 rounded-lg bg-slate-50 outline-green-500">
                        <button id="btnYukle" onclick="yedekYukle()" class="btn bg-green-600 text-white w-full py-3 hover:bg-green-500 shadow-lg shadow-green-600/30"><span class="material-icons mr-2">upload</span> Yükle</button>
                    </div>
                </div>`;
        }

        async function yedekAl(paylas = false) {
            const btn = document.getElementById(paylas ? 'btnPaylas' : 'btnYedekAl');
            btn.innerHTML = '<span class="material-icons animate-spin mr-2">refresh</span> İşleniyor...';
            btn.disabled = true;

            try {
                const u = await db.urunler.toArray(); const c = await db.kategoriler.toArray(); const h = await db.hareketler.toArray();
                for(let item of u) { item.tip = 'urun'; item.qrBase64 = await getQrBase64(item.qrData || "SKU-" + (item.sku||"X")); }
                for(let item of c) { item.tip = 'kategori'; item.qrBase64 = await getQrBase64("cat_" + item.id); }
                for(let item of h) { item.tip = 'hareket'; }

                const data = [...u, ...c, ...h];
                if(data.length === 0) return alert("Veri bulunamadı!");
                
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "StokYedek");
                
                if (paylas && navigator.canShare) {
                    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const file = new File([blob], "StokPro_V33_Yedek.xlsx", { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                    try { await navigator.share({ files: [file], title: 'StokPro Yedek', text: 'StokPro envanter yedeği ektedir.' }); } 
                    catch(e) { console.log("Paylaşım iptal", e); }
                } else {
                    XLSX.writeFile(wb, "StokPro_V33_Yedek.xlsx");
                }
            } catch(err) {
                console.error(err); alert("Yedek alınırken hata oluştu.");
            } finally {
                renderYedekleme();
            }
        }

        async function yedekYukle() {
            const file = document.getElementById('imp').files[0];
            if(!file) return alert("Lütfen bir yedek dosyası seçin!");
            
            const btn = document.getElementById('btnYukle');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-icons animate-spin mr-2">refresh</span> İşleniyor...';
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0]; 
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet);

                    if (!json || json.length === 0) {
                        alert("Uyarı: Yedek dosyasında okunabilir veri bulunamadı.");
                        btn.innerHTML = originalText; btn.disabled = false;
                        return;
                    }

                    for(let i of json) {
                        if(i.tip === 'urun') { delete i.tip; delete i.qrBase64; await db.urunler.put(i); }
                        else if(i.tip === 'kategori') { delete i.tip; delete i.qrBase64; await db.kategoriler.put(i); }
                        else if(i.tip === 'hareket') { delete i.tip; await db.hareketler.put(i); }
                    }
                    alert("Harika! Geri Yükleme İşlemi Başarıyla Tamamlandı."); 
                    renderEnvanter();
                } catch(err) { 
                    alert("Yedek bozuk veya format uyumsuz. Hata detayı: " + err.message); 
                    btn.innerHTML = originalText; btn.disabled = false;
                }
            }; 
            reader.readAsArrayBuffer(file);
        }

        // --- AKILLI KAMERA (Standart Barkod / 1D Destekli) ---
        async function renderTarayici() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="max-w-xl mx-auto">
                    <h2 class="text-3xl font-bold text-slate-800 mb-6 flex items-center justify-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> Barkod / QR Kod Okuyucu</h2>
                    <div class="card text-center p-8 bg-slate-900 border-0 shadow-2xl">
                        <div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden mb-4 min-h-[300px]"></div>
                        <div id="result" class="mb-6 font-bold text-blue-400 h-6 animate-pulse">${t('scan')}</div>
                        <button onclick="renderDashboard()" class="btn bg-red-600 text-white w-full py-3 hover:bg-red-500 shadow-lg shadow-red-600/30">Kamerayı Kapat</button>
                    </div>
                </div>`;
            
            html5QrCode = new Html5Qrcode("reader");
            // Özel veya standart barkod tümünü okur
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, async (text) => {
                stopScanner(); 
                document.getElementById('result').innerText = "Yönlendiriliyor...";
                
                // Kategori QR Kodu İse
                if (text.startsWith("cat_")) {
                    showKategoriUrunleri(parseInt(text.replace("cat_", ""))); 
                    return;
                }
                
                // Eğer QR veya 1D Barkod Okunduysa (Veritabanında ara)
                // Kendi bastığımız QR'lar SKU- ile başlıyor olabilir, temizleyelim.
                let temizText = text.replace("SKU-", "");
                
                // Önce temizlenmiş haliyle ara, bulamazsa raw text ile ara
                let urun = await db.urunler.where("sku").equals(temizText).first();
                if (!urun) {
                    urun = await db.urunler.where("sku").equals(text).first();
                }

                if (urun) {
                    showUrunDetay(urun.id);
                } else {
                    alert("Sistemde bu barkoda ait ürün bulunamadı:\nDeğer: " + text); 
                    renderTarayici();
                }
            }).catch(() => { document.getElementById('result').innerText = "Kamera erişim hatası!"; });
        }

        // Uygulama Başlatma
        updateMenuText();
        renderDashboard();
    </script>
</body>
</html>
