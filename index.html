<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Stok Pro V.29 - Onursal Gönen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @media print { .no-print { display: none !important; } .print-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; } .qr-item { width: auto; text-align: center; font-size: 10px; border: 1px solid #000; padding: 10px; break-inside: avoid;} }
        body { background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 1.5rem; border: 1px solid #e2e8f0; }
        .btn { transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex h-screen font-sans">
    
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col no-print shadow-xl z-10 relative">
        <div class="p-6 border-b border-slate-700 mb-4 cursor-pointer hover:bg-slate-800 transition" onclick="showChangelog()">
            <h1 class="font-bold text-2xl text-white tracking-wide">Stok<span class="text-blue-500">Pro</span></h1>
            <p class="text-xs text-blue-400 mt-1 uppercase tracking-widest font-bold">V.29 <span class="text-slate-400 font-normal">Onursal Gönen</span></p>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
            <button onclick="renderDashboard()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">dashboard</span> <span id="m-dash">Dashboard</span></button>
            <button onclick="renderKategoriler()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">domain</span> <span id="m-cat">Lokasyonlar</span></button>
            <button onclick="renderEnvanter()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">inventory_2</span> <span id="m-inv">Envanter</span></button>
            <button onclick="renderYedekleme()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">backup</span> <span id="m-back">Yedekleme</span></button>
            
            <div class="pt-4 mt-4 border-t border-slate-700">
                <button onclick="renderTarayici()" class="w-full flex items-center p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-lg shadow-lg shadow-blue-900/20 transition"><span class="material-icons mr-3">qr_code_scanner</span> <span id="m-scan">QR Kod Tara</span></button>
            </div>
            
            <div class="pt-4 mt-4 border-t border-slate-700">
                <button onclick="toggleLang()" class="w-full flex items-center justify-center p-3 bg-slate-800 text-white hover:bg-slate-700 rounded-lg transition"><span class="material-icons mr-2">language</span> <span id="m-lang">EN / TR</span></button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative" id="content"></main>
    <div id="modal-container" class="fixed inset-0 modal hidden flex items-center justify-center z-50 p-4 bg-black bg-opacity-50"></div>

    <script>
        // --- DİL ALTYAPISI ---
        let lang = localStorage.getItem('stokProLang') || 'TR';
        
        const i18n = {
            TR: { 
                dash: "Genel Bakış", cat: "Lokasyonlar", inv: "Envanter", back: "Yedekleme Merkezi", scan: "QR Kod Tara", langTxt: "Switch to English", 
                totalProd: "Toplam Ürün/Set", critStock: "Kritik Stok Uyarısı", history: "Son Stok Hareketleri", alert: "Acil Durumlar (SKT & Stok)",
                newProd: "Yeni Ürün / Set", printAll: "Tüm QR Yazdır", setTag: "SET", setContents: "Set İçeriği (Alt Ürünler)",
                exp: "Dışa Aktar", imp: "İçe Aktar (Kurtarma)", shareBtn: "Paylaş (Email/Drive)", photo: "Fotoğraf",
                tel: "Tel Numarası", status: "Ürün Durumu", inInv: "Envanterde", notInInv: "Envanterde Değil",
                buy: "Alış Fiyatı", sell: "Satış Fiyatı / Rate", tax: "Vergilendirme"
            },
            EN: { 
                dash: "Dashboard", cat: "Locations", inv: "Inventory", back: "Backup Center", scan: "Scan QR", langTxt: "Türkçeye Geç",
                totalProd: "Total Products", critStock: "Critical Stock", history: "Recent Activity", alert: "Alerts (EXP & Stock)",
                newProd: "Add Product / Set", printAll: "Print All QR", setTag: "SET", setContents: "Set Contents (Sub-items)",
                exp: "Export Data", imp: "Import (Restore)", shareBtn: "Share (Email/Drive)", photo: "Photo",
                tel: "Phone Number", status: "Status", inInv: "In Inventory", notInInv: "Not In Inventory",
                buy: "Purchase Price", sell: "Sale Price / Rate", tax: "Taxable"
            }
        };
        const t = (key) => i18n[lang][key];

        function toggleLang() {
            lang = lang === 'TR' ? 'EN' : 'TR';
            localStorage.setItem('stokProLang', lang);
            updateMenuText();
            if(document.getElementById('pageTitle')) {
                const title = document.getElementById('pageTitle').dataset.page;
                if(title === 'dash') renderDashboard();
                if(title === 'cat') renderKategoriler();
                if(title === 'inv') renderEnvanter();
                if(title === 'back') renderYedekleme();
            }
        }

        function updateMenuText() {
            document.getElementById('m-dash').innerText = t('dash');
            document.getElementById('m-cat').innerText = t('cat');
            document.getElementById('m-inv').innerText = t('inv');
            document.getElementById('m-back').innerText = t('back');
            document.getElementById('m-scan').innerText = t('scan');
            document.getElementById('m-lang').innerText = t('langTxt');
        }

        function showChangelog() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full">
                    <h2 class="text-2xl font-bold text-blue-600 mb-4 border-b pb-2">V.29 Yenilikleri</h2>
                    <ul class="space-y-3 text-slate-700 text-sm mb-6">
                        <li><b class="text-slate-900">💵 Finans & Fiyat:</b> Ürünlere Alış ve Satış fiyatları eklendi.</li>
                        <li><b class="text-slate-900">📋 Ürün Durumu:</b> "Envanterde" veya "Envanterde Değil" seçeneği eklendi.</li>
                        <li><b class="text-slate-900">📑 Vergilendirme:</b> Ürün bazlı vergi (Evet/Hayır) mantığı entegre edildi.</li>
                        <li><b class="text-slate-900">📞 İletişim:</b> Ürün kartlarına Tedarikçi/Müşteri Telefon numarası alanı açıldı.</li>
                        <li><b class="text-slate-900">📊 Detay Paneli:</b> Ürün detay ekranında tüm bu bilgiler için yepyeni bilgi kartları tasarlandı.</li>
                    </ul>
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="w-full btn bg-slate-800 text-white">Kapat</button>
                </div>`;
            modal.classList.remove('hidden');
        }

        // --- VERİTABANI GÜNCELLEMESİ (V.5 - Yeni Alanlar) ---
        const db = new Dexie("StokPro_TamSurum");
        db.version(5).stores({ 
            kategoriler: '++id, isim, depo, oda, raf', 
            urunler: '++id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData, isSet, setLinkleri, foto, tel, alis, satis, durum, vergi', 
            hareketler: '++id, urunId, urunIsim, tip, miktar, tarih' 
        }).upgrade(tx => console.log("DB Güncellendi V5"));

        let html5QrCode = null;

        function stopScanner() { if (html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode = null); } catch (e) {} } }
        function getQrBase64(text) { return new Promise(resolve => { if(!text) return resolve(""); const div = document.createElement('div'); new QRCode(div, { text: text, width: 128, height: 128 }); setTimeout(() => { const canvas = div.querySelector('canvas'); resolve(canvas ? canvas.toDataURL('image/png') : ""); }, 50); }); }
        function calculateSktDiff(sktString) { if(!sktString) return null; const parts = sktString.split('-'); const sktDate = new Date(parts[0], parts[1]-1, parts[2]); const bugun = new Date(); bugun.setHours(0,0,0,0); return Math.ceil((sktDate - bugun) / (1000 * 60 * 60 * 24)); }

        // --- DASHBOARD ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0));
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 id="pageTitle" data-page="dash" class="text-3xl font-bold text-slate-800">${t('dash')}</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="card border-l-4 border-blue-500 flex items-center">
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-full mr-4"><span class="material-icons text-3xl">inventory</span></div>
                        <div><p class="text-slate-500 font-medium">${t('totalProd')}</p><h3 class="text-3xl font-bold text-slate-800">${urunler.length}</h3></div>
                    </div>
                    <div class="card border-l-4 border-red-500 flex items-center cursor-pointer" onclick="renderEnvanter()">
                        <div class="p-4 bg-red-50 text-red-600 rounded-full mr-4"><span class="material-icons text-3xl">warning</span></div>
                        <div><p class="text-slate-500 font-medium">${t('critStock')}</p><h3 class="text-3xl font-bold text-red-600">${kritikStok.length}</h3></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="card">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-slate-400">history</span> ${t('history')}</h3>
                        ${hareketler.length === 0 ? '<p class="text-slate-500 text-sm italic">-</p>' : `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead><tr class="text-slate-400 border-b"><th class="pb-2">Tarih</th><th class="pb-2">İşlem</th></tr></thead>
                                <tbody>
                                    ${hareketler.map(h => `
                                        <tr class="border-b last:border-0 hover:bg-slate-50">
                                            <td class="py-3 text-slate-500">${h.tarih.split(' ')[0]}</td>
                                            <td class="py-3 font-semibold text-slate-700">${h.urunIsim} <span class="ml-2 font-bold ${h.tip === 'Giriş' ? 'text-green-600' : 'text-red-600'}">${h.tip === 'Giriş' ? '+' : '-'}${h.miktar}</span></td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`}
                    </div>
                    <div class="card bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-yellow-500">notifications_active</span> ${t('alert')}</h3>
                        <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                            ${urunler.map(u => {
                                const fark = calculateSktDiff(u.skt);
                                if(fark === null) return '';
                                if(fark < 0) return `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold uppercase">SKT GEÇTİ!</span></div><span class="material-icons text-red-500">error</span></div>`;
                                if(fark >= 0 && fark <= 30) return `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold">SKT: ${fark} gün kaldı</span></div><span class="material-icons text-yellow-600">warning</span></div>`;
                                return '';
                            }).join('')}
                            ${kritikStok.map(u => `<div class="p-3 bg-orange-100 border border-orange-200 text-orange-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs">Düşük Stok (Mevcut: ${u.stok})</span></div><span class="material-icons">chevron_right</span></div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        // --- LOKASYON / KATEGORİ MODÜLÜ ---
        async function renderKategoriler() {
            stopScanner();
            const cats = await db.kategoriler.toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8 no-print">
                    <h2 id="pageTitle" data-page="cat" class="text-3xl font-bold text-slate-800">${t('cat')}</h2>
                    <div class="space-x-2 flex">
                        <button onclick="printKategoriler()" class="btn bg-slate-800 text-white hover:bg-slate-700"><span class="material-icons">print</span></button>
                        <button onclick="showKatForm()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-1">add</span> Yeni</button>
                    </div>
                </div>
                <div id="katGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 no-print"></div>`;
            
            setTimeout(() => {
                cats.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "card text-center hover:border-blue-300 transition duration-300 flex flex-col items-center";
                    div.innerHTML = `
                        <h3 class="font-bold text-lg text-slate-700 mb-2">${c.isim}</h3>
                        <p class="text-xs text-slate-500 mb-4">D:${c.depo||'-'} | O:${c.oda||'-'} | R:${c.raf||'-'}</p>
                        <div id="qr-kat-${c.id}" class="mb-6 p-2 bg-white border rounded shadow-sm"></div>
                        <div class="flex justify-center space-x-2 mt-auto w-full border-t pt-4">
                            <button onclick="showKategoriUrunleri(${c.id})" class="btn bg-blue-50 text-blue-600 p-2 hover:bg-blue-100"><span class="material-icons">visibility</span></button>
                            <button onclick="showKatForm(${c.id})" class="btn bg-yellow-50 text-yellow-600 p-2 hover:bg-yellow-100"><span class="material-icons">edit</span></button>
                            <button onclick="silKat(${c.id})" class="btn bg-red-50 text-red-600 p-2 hover:bg-red-100"><span class="material-icons">delete</span></button>
                        </div>`;
                    document.getElementById('katGrid').appendChild(div);
                    new QRCode(document.getElementById(`qr-kat-${c.id}`), {text: "cat_"+c.id, width: 80, height: 80});
                });
            }, 50);
        }

        async function showKatForm(id = null) {
            const k = id ? await db.kategoriler.get(id) : {isim: '', depo: '', oda: '', raf: ''};
            const modal = document.createElement('div');
            modal.id = 'tempModal';
            modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center border-b pb-4"><span class="material-icons mr-2 text-blue-600">domain</span> ${id ? 'Lokasyon Düzenle' : 'Yeni Lokasyon'}</h2>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-blue-500">category</span> Kategori / İsmi *</label><input id="kIsim" value="${k.isim}" placeholder="Örn: Elektronik Parçalar" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">warehouse</span> Depo Adı / No</label><input id="kDepo" value="${k.depo}" placeholder="Örn: Ana Depo" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">meeting_room</span> Oda / Bölüm</label><input id="kOda" value="${k.oda}" placeholder="Örn: Bölüm A" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-2 flex items-center"><span class="material-icons text-sm mr-2 text-slate-500">layers</span> Raf Kodu</label><input id="kRaf" value="${k.raf}" placeholder="Örn: Raf-3" class="w-full border p-3 rounded-lg bg-slate-50 outline-blue-500"></div>
                    </div>
                    <div class="flex gap-4 mt-8 pt-6 border-t border-slate-100">
                        <button onclick="document.getElementById('tempModal').remove()" class="btn bg-slate-100 text-slate-700 w-full hover:bg-slate-200">İptal</button>
                        <button onclick="kaydetKat(${id || 'null'})" class="btn bg-blue-600 text-white w-full hover:bg-blue-500">Kaydet</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        }

        async function kaydetKat(id) {
            const isim = document.getElementById('kIsim').value;
            if(!isim) return alert("İsim zorunlu!");
            const data = { isim, depo: document.getElementById('kDepo').value, oda: document.getElementById('kOda').value, raf: document.getElementById('kRaf').value };
            if(id) await db.kategoriler.update(id, data); else await db.kategoriler.add(data);
            document.getElementById('tempModal').remove();
            renderKategoriler();
        }
        async function silKat(id) { if(confirm("Lokasyonu silmek istediğinize emin misiniz?")) { await db.kategoriler.delete(id); renderKategoriler(); } }

        async function showKategoriUrunleri(katId) {
            stopScanner();
            const kat = await db.kategoriler.get(katId);
            const urunler = await db.urunler.where({katId: katId}).toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-6">
                    <button onclick="renderKategoriler()" class="mr-4 text-slate-500 hover:text-blue-600"><span class="material-icons text-3xl">arrow_back</span></button>
                    <h2 class="text-2xl font-bold text-slate-800">📂 ${kat.isim}</h2>
                </div>
                <div class="card overflow-hidden">
                    <table class="w-full text-left">
                        <thead><tr class="bg-slate-50 text-slate-500"><th class="p-4">Foto / İsim</th><th class="p-4">Stok</th><th class="p-4">İşlem</th></tr></thead>
                        <tbody>
                            ${urunler.map(u => `
                                <tr class="border-t hover:bg-slate-50">
                                    <td class="p-4 font-semibold flex items-center">
                                        ${u.foto ? `<img src="${u.foto}" class="w-10 h-10 object-cover rounded mr-3 shadow">` : '<div class="w-10 h-10 bg-slate-100 rounded mr-3 flex items-center justify-center"><span class="material-icons text-slate-300">image</span></div>'}
                                        ${u.isim} ${u.durum === 'Envanterde Değil' ? '<span class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded ml-2">Envanter Dışı</span>' : ''}
                                    </td>
                                    <td class="p-4 font-bold text-lg">${u.stok}</td>
                                    <td class="p-4"><button onclick="showUrunDetay(${u.id})" class="btn bg-blue-100 text-blue-700 py-1 px-3">Seç</button></td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // --- ENVANTER LİSTESİ ---
        async function renderEnvanter(filtre = "") {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const liste = urunler.filter(u => u.isim.toLowerCase().includes(filtre.toLowerCase()) || (u.sku && u.sku.includes(filtre)));
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8 no-print">
                    <h2 id="pageTitle" data-page="inv" class="text-3xl font-bold text-slate-800">${t('inv')}</h2>
                    <div class="space-x-2 flex">
                        <button onclick="printUrunler()" class="btn bg-slate-800 text-white hover:bg-slate-700 mr-2"><span class="material-icons mr-2">print</span> ${t('printAll')}</button>
                        <button onclick="showUrunForm()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-2">add</span> ${t('newProd')}</button>
                    </div>
                </div>
                
                <div class="card overflow-hidden no-print">
                    <div class="mb-4 relative">
                        <span class="material-icons absolute left-3 top-3 text-slate-400">search</span>
                        <input oninput="renderEnvanter(this.value)" placeholder="İsim veya SKU..." class="w-full md:w-1/3 pl-10 pr-4 py-3 border rounded-lg bg-slate-50" value="${filtre}">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-slate-100 text-slate-500 uppercase text-xs tracking-wider"><th class="p-4 rounded-tl-lg">Foto/QR</th><th class="p-4">İsim / SKU</th><th class="p-4">Finans / Durum</th><th class="p-4 text-center">Stok</th><th class="p-4 text-right rounded-tr-lg">İşlemler</th></tr></thead>
                            <tbody>
                                ${liste.map(u => `
                                    <tr class="border-b last:border-0 hover:bg-slate-50 transition ${u.durum === 'Envanterde Değil' ? 'opacity-70' : ''}">
                                        <td class="p-4 w-24">
                                            <div class="flex flex-col items-center gap-2">
                                                ${u.foto ? `<img src="${u.foto}" class="w-10 h-10 object-cover rounded shadow">` : ''}
                                                <div id="qr-urun-${u.id}" class="bg-white p-1 border rounded inline-block"></div>
                                            </div>
                                        </td>
                                        <td class="p-4 cursor-pointer" onclick="showUrunDetay(${u.id})">
                                            <p class="font-bold text-slate-800 text-base">${u.isim} 
                                                ${u.isSet ? `<span class="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded ml-1">${t('setTag')}</span>` : ''}
                                                ${u.durum === 'Envanterde Değil' ? `<span class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded ml-1">Dışı</span>` : ''}
                                            </p>
                                            <p class="text-xs text-slate-400">SKU: ${u.sku}</p>
                                        </td>
                                        <td class="p-4 text-sm text-slate-600">

        function previewPhoto(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('foto-preview').src = e.target.result;
                document.getElementById('uFotoBase64').value = e.target.result;
                document.getElementById('foto-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
        function removePhoto() {
            document.getElementById('foto-preview').src = "";
            document.getElementById('uFotoBase64').value = "";
            document.getElementById('foto-preview-container').classList.add('hidden');
        }

                stok: parseInt(document.getElementById('uStok').value), skt: document.getElementById('uSkt').value, adres: document.getElementById('uAdres').value, 
                kritikSeviye: 0, qrData: "SKU-"+sku, isSet: document.getElementById('uIsSet').checked, setLinkleri: document.getElementById('uSetLinkleri').value,
                foto: document.getElementById('uFotoBase64').value,

        async function stokIslemi(urunId, tip) {
            const miktar = parseInt(document.getElementById('islemMiktar').value);
            if(isNaN(miktar) || miktar <= 0) return;
            const urun = await db.urunler.get(urunId);
            let ns = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok!");
            await db.urunler.update(urunId, {stok: ns});
            await db.hareketler.add({ urunId: urun.id, urunIsim: urun.isim, tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            showUrunDetay(urunId);
        }

        async function stokIslemiSetten(altUrunId, tip, anaUrunId) {
            const miktarInput = document.getElementById(`setMiktar-${altUrunId}`);
            if(!miktarInput) return;
            const miktar = parseInt(miktarInput.value);
            if(isNaN(miktar) || miktar <= 0) return alert("Geçerli bir miktar girin!");
            const altUrun = await db.urunler.get(altUrunId);
            let ns = tip === 'Giriş' ? altUrun.stok + miktar : altUrun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Alt üründe yetersiz stok!");
            await db.urunler.update(altUrunId, {stok: ns});
            await db.hareketler.add({ urunId: altUrun.id, urunIsim: altUrun.isim + " (Set Üzerinden)", tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            showUrunDetay(anaUrunId);
        }

                        <input type="file" id="imp" class="mb-4 block w-full border p-3 rounded-lg bg-slate-50 outline-green-500">
                        <button onclick="yedekYukle()" class="btn bg-green-600 text-white w-full py-3 hover:bg-green-500 shadow-lg shadow-green-600/30"><span class="material-icons mr-2">upload</span> Yükle</button>
                    </div>
                </div>`;

        async function yedekAl(paylas = false) {
            const btn = document.getElementById(paylas ? 'btnPaylas' : 'btnYedekAl');
            btn.innerHTML = '<span class="material-icons animate-spin mr-2">refresh</span> İşleniyor...';
            btn.disabled = true;

            const u = await db.urunler.toArray(); const c = await db.kategoriler.toArray(); const h = await db.hareketler.toArray();
            for(let item of u) { item.tip = 'urun'; item.qrBase64 = await getQrBase64(item.qrData || "SKU-" + (item.sku||"X")); }
            for(let item of c) { item.tip = 'kategori'; item.qrBase64 = await getQrBase64("cat_" + item.id); }
            for(let item of h) { item.tip = 'hareket'; }

            const data = [...u, ...c, ...h];
            if(data.length === 0) { renderYedekleme(); return alert("Veri bulunamadı!"); }
            
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "StokYedek");
            
            if (paylas && navigator.canShare) {
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const file = new File([blob], "StokPro_V29_Yedek.xlsx", { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                try { await navigator.share({ files: [file], title: 'StokPro Yedek', text: 'StokPro envanter yedeği ektedir.' }); } 
                catch(e) { console.log("Paylaşım iptal", e); }
            } else {
                XLSX.writeFile(wb, "StokPro_V29_Yedek.xlsx");
            }
            renderYedekleme();
        }

        async function yedekYukle() {
            const file = document.getElementById('imp').files[0];
            if(!file) return alert("Dosya seçin!");
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[0]);
                    for(let i of json) {
                        if(i.tip === 'urun') { delete i.tip; delete i.qrBase64; await db.urunler.put(i); }
                        else if(i.tip === 'kategori') { delete i.tip; delete i.qrBase64; await db.kategoriler.put(i); }
                        else if(i.tip === 'hareket') { delete i.tip; await db.hareketler.put(i); }
                    }
                    alert("Geri Yükleme Başarılı!"); renderEnvanter();
                } catch(err) { alert("Yedek bozuk veya format uyumsuz."); }
            }; reader.readAsArrayBuffer(file);
        }

        // --- AKILLI KAMERA ---
        async function renderTarayici() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="max-w-xl mx-auto">
                    <h2 class="text-3xl font-bold text-slate-800 mb-6 flex items-center justify-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> QR Kod Okuyucu</h2>
                    <div class="card text-center p-8 bg-slate-900 border-0 shadow-2xl">
                        <div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden mb-4 min-h-[300px]"></div>
                        <div id="result" class="mb-6 font-bold text-blue-400 h-6 animate-pulse">${t('scan')}</div>
                        <button onclick="renderDashboard()" class="btn bg-red-600 text-white w-full py-3 hover:bg-red-500 shadow-lg shadow-red-600/30">Kamerayı Kapat</button>
                    </div>
                </div>`;
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, async (text) => {
                stopScanner(); 
                document.getElementById('result').innerText = "Yönlendiriliyor...";
                if (text.startsWith("SKU-")) {
                    const u = await db.urunler.where("sku").equals(text.replace("SKU-", "")).first();
                    if (u) showUrunDetay(u.id); else { alert("Ürün bulunamadı!"); renderTarayici(); }
                } else if (text.startsWith("cat_")) {
                    showKategoriUrunleri(parseInt(text.replace("cat_", ""))); 
                } else { alert("Geçersiz QR"); renderTarayici(); }
            }).catch(() => { document.getElementById('result').innerText = "Kamera erişim hatası!"; });
        }

        // --- YAZDIRMA ---
        async function printKategoriler() {
            const cats = await db.kategoriler.toArray();
            document.getElementById('content').innerHTML = `<div class="print-grid" id="printArea">${cats.map(c => `<div class="qr-item"><div id="pq-${c.id}" style="display:flex; justify-content:center;"></div><p class="mt-2 font-bold">${c.isim}</p></div>`).join('')}</div>`;
            setTimeout(() => { cats.forEach(c => new QRCode(document.getElementById(`pq-${c.id}`), {text: "cat_"+c.id, width: 80, height: 80})); setTimeout(() => { window.print(); renderKategoriler(); }, 800); }, 100);
        }
        async function printUrunler() {
            const urunler = await db.urunler.toArray();
            document.getElementById('content').innerHTML = `<div class="print-grid" id="printArea">${urunler.map(u => `<div class="qr-item"><div id="pq-${u.id}" style="display:flex; justify-content:center;"></div><p class="mt-2 font-bold">${u.isim}</p><p>SKU:${u.sku}</p></div>`).join('')}</div>`;
            setTimeout(() => { urunler.forEach(u => new QRCode(document.getElementById(`pq-${u.id}`), {text: u.qrData, width: 80, height: 80})); setTimeout(() => { window.print(); renderEnvanter(); }, 800); }, 100);
        }

        // Uygulama Başlatma
        updateMenuText();
        renderDashboard();
    </script>
</body>
</html>
