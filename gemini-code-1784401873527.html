                colSku: "Barcode/SKU", colName: "Product Name", colCat: "Category", colStock: "Stock", colBuy: "Buy Price", colSell: "Sell Price", colExp: "Exp. Date",
                goBack: "Go Back", qty: "Quantity", entry: "ENTRY", exit: "EXIT", parties: "Parties / Batches", setCont: "Set Contents", currTot: "Current Total Stock",

        };

        let lang = localStorage.getItem('stokpro_lang') || 'tr';
        const t = (key) => i18n[lang][key] || key;
        const curr = () => i18n[lang].curr;

        function toggleLanguage() {
            lang = lang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('stokpro_lang', lang);
            updateSidebar(); refreshCurrentView();
        }

        function updateSidebar() {
            document.getElementById('lang-text').innerText = i18n[lang].langName;
            document.getElementById('sidebar-nav').innerHTML = `
                <button onclick="renderDashboard()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">dashboard</span> ${t('dash')}</button>
                <button onclick="renderKategoriler()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">domain</span> ${t('loc')}</button>
                <button onclick="renderEnvanter()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">inventory_2</span> ${t('inv')}</button>
                <button onclick="renderMuhasebe()" class="w-full flex items-center p-3 hover:bg-slate-800 text-emerald-400 hover:text-emerald-300 rounded-lg transition"><span class="material-icons mr-3">lock</span> ${t('acc')}</button>
                <button onclick="renderYedekleme()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition">
                    <span class="material-icons mr-3">backup</span> ${t('net')}
                    <span id="menuSyncCount" class="ml-auto bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full hidden">0</span>
                </button>
                <div class="pt-4 mt-4 border-t border-slate-700">
                    <button onclick="renderTarayici()" class="w-full flex items-center p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-lg shadow-lg shadow-blue-900/20 transition"><span class="material-icons mr-3">qr_code_scanner</span> ${t('scan')}</button>
                </div>`;
            updateSyncUI();
        }

        function showChangelog() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full">
                    <h2 class="text-2xl font-bold text-blue-600 mb-4 border-b pb-2">V.48.1 Kilitli Finans & Renkli Rapor</h2>
                    <ul class="space-y-2 text-slate-700 text-sm mb-6">
                        <li><b class="text-slate-900">🔒 Finans Şifresi:</b> Muhasebe sekmesi artık (0000) şifresi ile korunuyor. Oturum bazlı kilit getirildi.</li>
                        <li><b class="text-slate-900">🎨 Renkli Excel:</b> Excel'e aktar özelliği artık hücreleri renklendiren, zebra desenli ve stok durumuna göre yeşil/kırmızı işaretleme yapan profesyonel bir arayüze sahip.</li>
                        <li><b class="text-slate-900">🐛 Kod Üretme Düzeltmesi:</b> Veri merkezinde sunucu başlattığınızda bağlantı kodunun kaybolması hatası giderildi.</li>
                    </ul>
                    <button onclick="document.getElementById('modal-container').classList.add('hidden')" class="w-full btn bg-slate-800 text-white">${t('cancel')}</button>
                </div>`;
            modal.classList.remove('hidden');
        }

        // --- VERİTABANI ---
        const db = new Dexie("StokPro_TamSurum");
        db.version(12).stores({ 
            kategoriler: 'id, isim, depo, oda, raf', 
            urunler: 'id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData, isSet, setLinkleri, foto, tel, alis, satis, durum, vergi, vergiOrani, maliyetDetay, aciklama, *koliler', 
            hareketler: 'id, urunId, urunIsim, tip, miktar, tarih',
            giderler: 'id, baslik, tutar, tarih, notlar'
        });

        function generateId() { return Date.now() + Math.floor(Math.random() * 1000000); }
        let html5QrCode = null;
        function stopScanner() { if (html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode = null); } catch (e) {} } }
        
        function calculateSktDiff(sktString) { 
            if(!sktString || sktString.trim() === '') return null; 
            let normalized = sktString.replace(/[\/\.]/g, '-').trim(); let parts = normalized.split('-'); 
            let year, month, day = 1;
            if (parts.length === 2) { if (parts[0].length === 4) { year = parts[0]; month = parts[1]; } else { month = parts[0]; year = parts[1]; } } 
            else if (parts.length === 3) { if (parts[0].length === 4) { year = parts[0]; month = parts[1]; day = parts[2]; } else { day = parts[0]; month = parts[1]; year = parts[2]; } } 
            else { return null; }
            const sktDate = new Date(year, month-1, day); 
            if(isNaN(sktDate.getTime())) return null;
            const bugun = new Date(); bugun.setHours(0,0,0,0); 
            return Math.ceil((sktDate - bugun) / 86400000); 
        }

        function otomatikDurum(stokDegeri) {
            const select = document.getElementById('uDurum');
            if(!select) return;
            if(parseInt(stokDegeri) <= 0) { select.value = 'Envanterde Değil'; select.classList.add('bg-red-50', 'text-red-700', 'font-bold'); } 
            else { select.value = 'Envanterde'; select.classList.remove('bg-red-50', 'text-red-700', 'font-bold'); }
        }

        // --- DASHBOARD ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0) && u.durum !== 'Envanterde Değil');
            const aktifUrunler = urunler.filter(u => u.durum !== 'Envanterde Değil').length;
            const tukenenUrunler = urunler.filter(u => u.durum === 'Envanterde Değil').length;
            
            let totalCost = 0; let totalSalesValue = 0; let alertHtml = ''; let alertCount = 0;

            urunler.forEach(u => {
                if(u.durum !== 'Envanterde Değil' && u.stok > 0) { totalCost += (parseFloat(u.alis) || 0) * u.stok; totalSalesValue += (parseFloat(u.satis) || 0) * u.stok; }
                if(u.durum !== 'Envanterde Değil') {
                    const fark = calculateSktDiff(u.skt);
                    if(fark !== null) {
                        if(fark < 0) { alertCount++; alertHtml += `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold uppercase block text-red-600">${t('expired')}</span></div><span class="material-icons text-red-500">error</span></div>`; } 
                        else if(fark >= 0 && fark <= 30) { alertCount++; alertHtml += `<div class="p-3 bg-yellow-100 border border-yellow-300 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs font-bold block text-yellow-700">SKT: ${fark} ${t('daysLeft')}</span></div><span class="material-icons text-yellow-600">warning</span></div>`; }
                    }
                }
            });

            kritikStok.forEach(u => { alertCount++; alertHtml += `<div class="p-3 bg-orange-100 border border-orange-200 text-orange-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm mt-2" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs block">${t('lowStock')} (${u.stok} / ${u.kritikSeviye})</span></div><span class="material-icons">chevron_right</span></div>`; });
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 id="pageTitle" data-page="dash" class="text-3xl font-bold text-slate-800">${t('overview')}</h2></div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="card border-l-4 border-blue-500 p-4"><p class="text-slate-500 text-xs mb-1 font-bold">${t('totalProd')}</p><h3 class="text-3xl font-bold mb-2">${urunler.length}</h3><div class="flex flex-wrap gap-2"><span class="text-[10px] bg-green-100 text-green-800 font-bold px-2 py-1 rounded">${t('active')}: ${aktifUrunler}</span><span class="text-[10px] bg-red-100 text-red-800 font-bold px-2 py-1 rounded">${t('outOfStock')}: ${tukenenUrunler}</span></div></div>
                    <div class="card border-l-4 border-red-500 p-4 cursor-pointer hover:bg-red-50 flex flex-col justify-center" onclick="renderEnvanter('', true)"><p class="text-slate-500 text-xs mb-1 font-bold">${t('crit')}</p><h3 class="text-2xl font-bold text-red-600 flex items-center">${kritikStok.length} <span class="material-icons text-sm ml-2">launch</span></h3></div>
                    <div class="card border-l-4 border-green-500 p-4 flex flex-col justify-center cursor-pointer hover:bg-green-50" onclick="renderMuhasebe()"><p class="text-slate-500 text-xs mb-1 font-bold">${t('invCost')}</p><h3 class="text-xl font-bold text-green-700">${totalCost.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>
                    <div class="card border-l-4 border-purple-500 p-4 flex flex-col justify-center cursor-pointer hover:bg-purple-50" onclick="renderMuhasebe()"><p class="text-slate-500 text-xs mb-1 font-bold">${t('estSales')}</p><h3 class="text-xl font-bold text-purple-700">${totalSalesValue.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="card"><h3 class="text-lg font-bold mb-4 flex items-center"><span class="material-icons mr-2 text-slate-400">history</span> ${t('recentMov')}</h3>${hareketler.length === 0 ? `<p class="text-slate-500 text-sm italic">${t('noMov')}</p>` : `<table class="w-full text-left text-sm"><tbody>${hareketler.map(h => `<tr class="border-b last:border-0 hover:bg-slate-50"><td class="py-3 text-slate-500">${h.tarih.split(' ')[0]}</td><td class="py-3 font-semibold">${h.urunIsim} <span class="${h.tip === 'Giriş' ? 'text-green-600' : 'text-red-600'}">${h.tip === 'Giriş' ? '+' : '-'}${h.miktar}</span></td></tr>`).join('')}</tbody></table>`}</div>
                    <div class="card bg-slate-50"><h3 class="text-lg font-bold mb-4 flex items-center"><span class="material-icons mr-2 text-yellow-500">notifications_active</span> ${t('alerts')} ${alertCount > 0 ? `<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full ml-2">${alertCount}</span>` : ''}</h3><div class="space-y-3 max-h-96 overflow-y-auto pr-2">${alertHtml || `<p class="text-slate-500 text-sm">${t('noAlert')}</p>`}</div></div>
                </div>`;
        }

        // --- MUHASEBE & FİNANS ---
        async function renderMuhasebe() {
            stopScanner();
            
            // ŞİFRE KORUMASI (Oturum bazlı)
            if (sessionStorage.getItem('stokpro_muhasebe_kilit') !== 'acik') {
                const pass = prompt("Muhasebe ve Finans bölümüne girmek için şifreyi giriniz (İpucu: 0000):");
                if (pass === "0000") {
                    sessionStorage.setItem('stokpro_muhasebe_kilit', 'acik');
                } else {
                    if (pass !== null) alert("Hatalı şifre!");
                    if (document.getElementById('pageTitle') && document.getElementById('pageTitle').dataset.page === 'acc') {
                        // Zaten bu sayfadaysa ama şifre sorulmuşsa başa dön
                        renderDashboard();
                    }
                    return; 
                }
            }

            const includeOut = document.getElementById('accIncludeOut') ? document.getElementById('accIncludeOut').checked : false;
            let urunler = await db.urunler.toArray();
            if(!includeOut) urunler = urunler.filter(u => u.durum !== 'Envanterde Değil' && u.stok > 0);
            
            const giderler = await db.giderler.toArray();
            
            let totalMaliyet = 0; let totalSatis = 0; let totalVergi = 0;
            urunler.forEach(u => {
                let m = (parseFloat(u.alis) || 0) * u.stok;
                let s = (parseFloat(u.satis) || 0) * u.stok;
                let v = u.vergi ? (s * ((parseFloat(u.vergiOrani) || 20) / 100)) : 0;
                totalMaliyet += m; totalSatis += s; totalVergi += v;
            });
            
            let totalGider = giderler.reduce((sum, g) => sum + (parseFloat(g.tutar) || 0), 0);
            let netKar = (totalSatis - totalMaliyet - totalGider - totalVergi);

            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 id="pageTitle" data-page="acc" class="text-3xl font-bold text-slate-800 flex items-center"><span class="material-icons mr-2 text-emerald-600">lock_open</span> ${t('acc')}</h2>
                    <div class="flex items-center space-x-3">

                    <div class="card border-l-4 border-purple-500 p-4"><p class="text-slate-500 text-xs mb-1 font-bold">${t('estSales')}</p><h3 class="text-xl font-bold text-purple-700">${totalSatis.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>
                    <div class="card border-l-4 border-orange-500 p-4"><p class="text-slate-500 text-xs mb-1 font-bold">${t('totalTax')}</p><h3 class="text-xl font-bold text-orange-600">${totalVergi.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>
                    <div class="card border-l-4 border-red-500 p-4 cursor-pointer hover:bg-red-50" onclick="showGiderModal()"><p class="text-slate-500 text-xs mb-1 font-bold flex items-center">${t('totalExp')} <span class="material-icons text-sm ml-1">add_circle</span></p><h3 class="text-xl font-bold text-red-600">${totalGider.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>
                    <div class="card border-l-4 ${netKar >= 0 ? 'border-emerald-500' : 'border-red-500'} p-4 bg-emerald-50"><p class="text-emerald-800 text-xs mb-1 font-bold">${t('expProfit')}</p><h3 class="text-xl font-bold ${netKar >= 0 ? 'text-emerald-700' : 'text-red-600'}">${netKar.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ${curr()}</h3></div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-2 card overflow-hidden p-0"><div class="p-4 border-b bg-slate-50"><h3 class="font-bold text-slate-700">Ürün Bazlı Finans (Stok x Fiyat)</h3></div>
                        <div class="overflow-x-auto max-h-[500px]"><table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-white shadow-sm"><tr class="text-slate-500 uppercase text-xs tracking-wider"><th class="p-3">Ürün</th><th class="p-3 text-right">Maliyet</th><th class="p-3 text-right">Ciro</th><th class="p-3 text-right">Vergi</th><th class="p-3 text-right">Brüt Kar</th></tr></thead>
                            <tbody>${urunler.map(u => {
                                let m = (parseFloat(u.alis)||0)*u.stok; let s = (parseFloat(u.satis)||0)*u.stok; let v = u.vergi ? (s*((parseFloat(u.vergiOrani)||20)/100)) : 0; let k = s - m - v;
                                return `<tr class="border-b last:border-0 hover:bg-slate-50"><td class="p-3 font-semibold text-slate-800">${u.isim} <span class="text-xs text-slate-400 block">${u.stok} adet</span></td><td class="p-3 text-right text-slate-600">${m.toLocaleString('tr-TR')}</td><td class="p-3 text-right text-purple-600">${s.toLocaleString('tr-TR')}</td><td class="p-3 text-right text-orange-600">${v.toLocaleString('tr-TR')}</td><td class="p-3 text-right font-bold ${k>=0?'text-emerald-600':'text-red-500'}">${k.toLocaleString('tr-TR')}</td></tr>`;
                            }).join('')}</tbody>
                        </table></div>
                    </div>
                    <div class="card p-0 overflow-hidden flex flex-col"><div class="p-4 border-b bg-red-50 flex justify-between items-center"><h3 class="font-bold text-red-800">${t('totalExp')}</h3><button onclick="showGiderModal()" class="btn bg-red-600 text-white text-xs p-1 px-2 shadow">Ekle</button></div>
                        <div class="flex-1 overflow-y-auto max-h-[500px] p-4 space-y-3">
                            ${giderler.length === 0 ? `<p class="text-sm text-slate-500 italic">Kayıtlı gider yok.</p>` : giderler.map(g => `
                                <div class="bg-white border rounded p-3 shadow-sm relative group">
                                    <h4 class="font-bold text-slate-700 text-sm">${g.baslik}</h4><p class="text-xs text-slate-400 mb-1">${g.tarih}</p><p class="font-bold text-red-600">${parseFloat(g.tutar).toLocaleString('tr-TR')} ${curr()}</p>
                                    <button onclick="silGider(${g.id})" class="absolute top-2 right-2 text-red-400 hover:text-red-700 hidden group-hover:block"><span class="material-icons text-sm">delete</span></button>
                                </div>

                        </div>
                    </div>
                </div>`;
        }

        function kilitleMuhasebe() {
            sessionStorage.removeItem('stokpro_muhasebe_kilit');
            renderDashboard();
        }

        function showGiderModal() {
            const modal = document.createElement('div'); modal.id = 'tempModal'; modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full"><h2 class="text-2xl font-bold mb-6 text-red-600">${t('addExp')}</h2>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">${t('expName')}</label><input id="gBaslik" placeholder="Örn: Kira, Fatura" class="w-full border p-3 rounded bg-slate-50 outline-red-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">${t('expAmount')} (${curr()})</label><input id="gTutar" type="number" step="0.01" class="w-full border p-3 rounded bg-slate-50 outline-red-500"></div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">${t('expDate')}</label><input id="gTarih" type="date" value="${new Date().toISOString().split('T')[0]}" class="w-full border p-3 rounded bg-slate-50"></div>
                    </div>
                    <div class="flex gap-4 mt-6"><button onclick="document.getElementById('tempModal').remove()" class="btn bg-slate-100 w-full">${t('cancel')}</button><button onclick="kaydetGider()" class="btn bg-red-600 text-white w-full shadow-lg">${t('save')}</button></div>
                </div>`; document.body.appendChild(modal);
        }

        async function kaydetGider() {
            const baslik = document.getElementById('gBaslik').value.trim(); const tutar = parseFloat(document.getElementById('gTutar').value);
            if(!baslik || isNaN(tutar)) return;
            await db.giderler.put({ id: generateId(), baslik: baslik, tutar: tutar, tarih: document.getElementById('gTarih').value, notlar: '' });
            document.getElementById('tempModal').remove(); triggerAutoSync(); renderMuhasebe();
        }

        async function silGider(id) {
            if(confirm("Bu gideri silmek istediğinize emin misiniz?")) { await db.giderler.delete(id); triggerAutoSync(); renderMuhasebe(); }
        }

        // --- LOKASYONLAR ---
        async function renderKategoriler() {
            stopScanner();
            const cats = await db.kategoriler.toArray();
            const urunler = await db.urunler.toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 id="pageTitle" data-page="cat" class="text-3xl font-bold text-slate-800">${t('loc')}</h2>
                    <div class="space-x-2 flex items-center flex-wrap gap-y-2">
                        <button onclick="printSecilenKat()" class="btn bg-slate-800 text-white" title="${t('print')}"><span class="material-icons">print</span></button>
                        <button onclick="silSecilenKat()" class="btn bg-red-600 text-white"><span class="material-icons">delete</span></button>
                        <div class="hidden md:block h-8 w-px bg-slate-300 mx-2"></div>
                        <button onclick="showKatForm()" class="btn bg-blue-600 text-white"><span class="material-icons mr-1">add</span> ${t('new')}</button>
                    </div>
                </div>
                <div id="katGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>`;
            setTimeout(() => {
                cats.forEach(c => {
                    const uCount = urunler.filter(u => u.katId === c.id).length;
                    const div = document.createElement('div');
                    div.className = "card text-center relative hover:border-blue-300 transition shadow-sm hover:shadow-md";
                    div.innerHTML = `
                        <input type="checkbox" class="kat-checkbox absolute top-4 left-4 w-5 h-5 accent-blue-600" data-id="${c.id}">
                        <h3 class="font-bold text-lg mb-2 mt-6">${c.isim}</h3><p class="text-xs text-slate-500 mb-2">D:${c.depo||'-'} | O:${c.oda||'-'} | R:${c.raf||'-'}</p><p class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full mb-4 inline-block">${uCount} ${t('totalProd').split(' ')[1]}</p>
                        <div class="mb-6 flex justify-center"><div id="qr-kat-${c.id}" class="qr-2x2 border p-1 rounded"></div></div>
                        <div class="flex justify-center space-x-2 mt-auto border-t pt-4">
                            <button onclick="showKategoriUrunleri(${c.id})" class="btn bg-blue-50 text-blue-600 p-2" title="${t('inspect')}"><span class="material-icons">visibility</span></button>
                            <button onclick="showKatForm(${c.id})" class="btn bg-yellow-50 text-yellow-600 p-2" title="${t('edit')}"><span class="material-icons">edit</span></button>
                        </div>`;
                    document.getElementById('katGrid').appendChild(div);
                    new QRCode(document.getElementById(`qr-kat-${c.id}`), {text: "cat_"+c.id, width: 75, height: 75});
                });
            }, 50);
        }

        async function printSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            let hedefCats = secilenler.length > 0 ? await db.kategoriler.where('id').anyOf(secilenler).toArray() : await db.kategoriler.toArray(); 
            if (hedefCats.length === 0) return alert("Yazdırılacak veri yok!");
            const printEngine = document.getElementById('print-engine');
            printEngine.innerHTML = hedefCats.map(c => `<div class="qr-item"><div style="display:flex; justify-content:center;"><div id="pq-kat-${c.id}" class="qr-2x2"></div></div><p>${c.isim}</p><span>${c.depo||'-'}/${c.oda||'-'}</span></div>`).join('');
            printEngine.classList.remove('hidden-force');
            setTimeout(() => { hedefCats.forEach(c => new QRCode(document.getElementById(`pq-kat-${c.id}`), {text: "cat_"+c.id, width: 75, height: 75})); setTimeout(() => { window.focus(); window.print(); printEngine.classList.add('hidden-force'); printEngine.innerHTML = ''; }, 800); }, 100);
        }

        async function silSecilenKat() {
            const secilenler = Array.from(document.querySelectorAll('.kat-checkbox:checked')).map(el => parseInt(el.dataset.id));
            if (secilenler.length === 0) return alert("En az bir lokasyon seçin!");
            if(confirm("Silmek istediğinize emin misiniz?")) { await db.kategoriler.bulkDelete(secilenler); triggerAutoSync(); renderKategoriler(); }
        }

        async function showKatForm(id = null) {
            const k = id ? await db.kategoriler.get(id) : {isim: '', depo: '', oda: '', raf: ''};
            const modal = document.createElement('div'); modal.id = 'tempModal'; modal.className = "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-8 max-w-md w-full"><h2 class="text-2xl font-bold mb-6">${id ? t('edit') : t('new')}</h2>
                    <div class="space-y-4"><input id="kIsim" value="${k.isim}" placeholder="Kategori/İsim *" class="w-full border p-3 rounded bg-slate-50"><input id="kDepo" value="${k.depo}" placeholder="Depo" class="w-full border p-3 rounded bg-slate-50"><input id="kOda" value="${k.oda}" placeholder="Oda" class="w-full border p-3 rounded bg-slate-50"><input id="kRaf" value="${k.raf}" placeholder="Raf" class="w-full border p-3 rounded bg-slate-50"></div>
                    <div class="flex gap-4 mt-6"><button onclick="document.getElementById('tempModal').remove()" class="btn bg-slate-100 w-full">${t('cancel')}</button><button onclick="kaydetKat(${id || 'null'})" class="btn bg-blue-600 text-white w-full">${t('save')}</button></div>
                </div>`; document.body.appendChild(modal);
        }

        async function kaydetKat(id) {
            const isim = document.getElementById('kIsim').value; if(!isim) return;
            const data = { isim, depo: document.getElementById('kDepo').value, oda: document.getElementById('kOda').value, raf: document.getElementById('kRaf').value };
            if(id) await db.kategoriler.update(id, data); else await db.kategoriler.put({ id: generateId(), ...data });
            document.getElementById('tempModal').remove(); triggerAutoSync(); renderKategoriler();
        }

        async function showKategoriUrunleri(katId) {
            const kat = await db.kategoriler.get(katId); const urunler = await db.urunler.where({katId: katId}).toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-6"><button onclick="renderKategoriler()" class="mr-4 hover:text-blue-600"><span class="material-icons">arrow_back</span></button><h2 class="text-2xl font-bold text-slate-800">${kat.isim} Ürünleri</h2></div>
                <div class="card overflow-hidden">${urunler.length === 0 ? `<p class="text-slate-500 italic p-4">Boş</p>` : `<table class="w-full text-left"><thead><tr class="bg-slate-100 text-slate-500 uppercase text-xs"><th class="p-4">${t('name')}</th><th class="p-4 text-center">${t('stock')}</th><th class="p-4 text-right">${t('actions')}</th></tr></thead><tbody>${urunler.map(u => `<tr class="border-t hover:bg-slate-50"><td class="p-4 font-semibold text-slate-800">${u.isim}</td><td class="p-4 font-bold text-center ${u.stok<=0?'text-red-500':''}">${u.stok}</td><td class="p-4 text-right"><button onclick="showUrunDetay(${u.id})" class="btn bg-blue-50 text-blue-600 p-2 text-sm">${t('inspect')}</button></td></tr>`).join('')}</tbody></table>`}</div>`;
        }

        // --- ENVANTER ---
        let globalKategoriler = []; let searchTimeout; 
        
        async function renderEnvanter(filtre = "", forceFilterCritical = false) {
            stopScanner();
            globalKategoriler = await db.kategoriler.toArray();
            const tumUrunler = await db.urunler.toArray();
            const aktifUrunler = tumUrunler.filter(u => u.durum !== 'Envanterde Değil').length;
            const tukenenUrunler = tumUrunler.filter(u => u.durum === 'Envanterde Değil').length;
            
            document.getElementById('content').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <div><h2 id="pageTitle" data-page="inv" class="text-3xl font-bold text-slate-800">${t('inv')}</h2><div class="flex space-x-3 mt-2"><span class="bg-blue-50 border border-blue-200 text-blue-800 px-3 py-1 rounded-lg text-sm font-bold shadow-sm">${t('active')}: ${aktifUrunler}</span><span class="bg-red-50 border border-red-200 text-red-800 px-3 py-1 rounded-lg text-sm font-bold shadow-sm">${t('outOfStock')}: ${tukenenUrunler}</span></div></div>
                    <div class="space-x-2 flex items-center flex-wrap gap-y-2"><button onclick="printSecilenUrunler()" class="btn bg-slate-800 text-white"><span class="material-icons">print</span></button><button onclick="silSecilenUrunler()" class="btn bg-red-600 text-white"><span class="material-icons">delete</span></button><div class="hidden md:block h-8 w-px bg-slate-300 mx-2"></div><button onclick="showUrunForm()" class="btn bg-blue-600 text-white"><span class="material-icons mr-1">add</span> ${t('newProd')}</button></div>
                </div>
                <div class="card overflow-hidden">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4"><div class="relative flex-1"><span class="material-icons absolute left-3 top-3 text-slate-400">search</span><input id="searchInput" onkeyup="handleSearchInput()" placeholder="${t('search')}" class="w-full pl-10 pr-4 py-3 border rounded-lg bg-slate-50 outline-blue-500"></div><div class="flex items-center bg-red-50 border border-red-200 p-2 px-4 rounded-lg"><input type="checkbox" id="showOutOfStock" onchange="updateEnvanterTable()" class="w-5 h-5 accent-red-600 cursor-pointer"><label for="showOutOfStock" class="ml-2 text-sm font-bold text-red-800 cursor-pointer select-none">${t('showOnlyOut')}</label></div></div>
                    <div class="overflow-x-auto"><table class="w-full text-left"><thead><tr class="bg-slate-100 text-slate-500 uppercase text-xs tracking-wider"><th class="p-4 rounded-tl-lg w-10"><input type="checkbox" class="w-5 h-5 accent-blue-600" onchange="toggleAllUrunler(this)"></th><th class="p-4">${t('photoQr')}</th><th class="p-4">${t('nameSkuLoc')}</th><th class="p-4 text-center">${t('stock')}</th><th class="p-4 text-right rounded-tr-lg">${t('actions')}</th></tr></thead><tbody id="envanterTbody"></tbody></table></div>
                </div>`;
            if(forceFilterCritical) { document.getElementById('searchInput').value = "[KRİTİK]"; }
            await updateEnvanterTable();
        }

        function handleSearchInput() { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { updateEnvanterTable(); }, 300); }

        async function updateEnvanterTable() {
            let filtre = document.getElementById('searchInput').value; let showOnlyOut = document.getElementById('showOutOfStock').checked; let isCriticalSearch = filtre === "[KRİTİK]"; if(isCriticalSearch) filtre = ""; 
            const urunler = await db.urunler.toArray();
            let liste = urunler.filter(u => u.isim.toLowerCase().includes(filtre.toLowerCase()) || (u.sku && u.sku.toLowerCase().includes(filtre.toLowerCase())));
            if(isCriticalSearch) { liste = liste.filter(u => u.stok <= (u.kritikSeviye || 0) && u.durum !== 'Envanterde Değil'); } else { liste = liste.filter(u => showOnlyOut ? u.durum === 'Envanterde Değil' : u.durum !== 'Envanterde Değil'); }
            const tbody = document.getElementById('envanterTbody'); if(!tbody) return; 
            tbody.innerHTML = liste.map(u => {
                const k = globalKategoriler.find(c => c.id === u.katId);
                return `<tr class="border-b last:border-0 hover:bg-slate-50 transition ${u.durum === 'Envanterde Değil' ? 'opacity-50 grayscale' : ''}"><td class="p-4"><input type="checkbox" class="urun-checkbox w-5 h-5 accent-blue-600" data-id="${u.id}"></td><td class="p-4 w-24"><div class="flex flex-col items-center gap-2">${u.foto ? `<img src="${u.foto}" class="w-10 h-10 object-cover rounded shadow">` : ''}<div class="bg-white p-1 border rounded inline-block"><div id="qr-urun-${u.id}" class="qr-2x2"></div></div></div></td><td class="p-4 cursor-pointer" onclick="showUrunDetay(${u.id})"><p class="font-bold text-slate-800 text-base">${u.isim} ${u.isSet ? `<span class="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded ml-1">SET</span>` : ''}</p><p class="text-[11px] text-slate-400 font-semibold">SKU: ${u.sku} | ${k ? k.isim : '-'}</p></td><td class="p-4 text-center"><span class="px-3 py-1 rounded-full font-bold ${u.stok <= u.kritikSeviye && u.durum !== 'Envanterde Değil' ? 'bg-red-100 text-red-700' : 'bg-slate-100'}">${u.stok}</span></td><td class="p-4 text-right"><button onclick="showUrunForm(${u.id})" class="btn bg-blue-50 text-blue-600 p-2"><span class="material-icons">edit</span></button></td></tr>`;
            }).join('');
            setTimeout(() => { liste.forEach(u => { const el = document.getElementById(`qr-urun-${u.id}`); if(el) new QRCode(el, {text: u.qrData, width: 75, height: 75}); }); }, 50);
        }

        function toggleAllUrunler(source) { document.querySelectorAll('.urun-checkbox').forEach(cb => cb.checked = source.checked); }
        
        async function printSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id)); let hedefUrunler = secilenler.length > 0 ? await db.urunler.where('id').anyOf(secilenler).toArray() : await db.urunler.toArray();
            if(hedefUrunler.length === 0) return alert("Yazdırılacak ürün bulunamadı!");
            const printEngine = document.getElementById('print-engine'); printEngine.innerHTML = hedefUrunler.map(u => `<div class="qr-item"><div style="display:flex; justify-content:center; margin-bottom:5px;"><div id="pq-urun-${u.id}" class="qr-2x2"></div></div><p>${u.isim}</p><span>SKU: ${u.sku}</span></div>`).join('');
            printEngine.classList.remove('hidden-force'); setTimeout(() => { hedefUrunler.forEach(u => new QRCode(document.getElementById(`pq-urun-${u.id}`), {text: u.qrData, width: 75, height: 75})); setTimeout(() => { window.focus(); window.print(); printEngine.classList.add('hidden-force'); printEngine.innerHTML = ''; }, 800); }, 100);
        }

        async function silSecilenUrunler() {
            const secilenler = Array.from(document.querySelectorAll('.urun-checkbox:checked')).map(el => parseInt(el.dataset.id)); if (secilenler.length === 0) return;
            if(confirm("Silmek istediğinize emin misiniz?")) { await db.urunler.bulkDelete(secilenler); triggerAutoSync(); renderEnvanter(); }
        }

        // --- ÜRÜN FORMU ---
        async function showUrunForm(id = null) {
            stopScanner();
            const u = id ? await db.urunler.get(id) : {isim: '', sku: '', stok: 0, skt: '', adres: '', kritikSeviye: 0, isSet: false, setLinkleri: '', foto: '', tel: '', alis: '', satis: '', durum: 'Envanterde', vergi: false, vergiOrani: 20, maliyetDetay: {}, aciklama: '', koliler: []};
            const cats = await db.kategoriler.toArray();
            const currentSku = u.sku || (Math.floor(10000000 + Math.random() * 90000000).toString());

            document.getElementById('content').innerHTML = `

        // AKILLI OCR GÜNCELLEMESİ
        async function okuIsimOcr() {
            const imgData = document.getElementById('uFotoBase64').value; const btn = document.getElementById('btnOcr'); if(!imgData) return;
            btn.innerHTML = `<span class="material-icons animate-spin text-[14px] mr-1">refresh</span>...`; btn.disabled = true;
            try {
                const result = await Tesseract.recognize(imgData, lang === 'tr' ? 'tur+eng' : 'eng'); 
                let lines = result.data.text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
                lines = lines.filter(l => { let letters = l.replace(/[^a-zA-ZğüşıöçĞÜŞİÖÇ]/g, '').length; return letters > (l.length * 0.3) && letters > 2; });
                if (lines.length > 0) { document.getElementById('uIsim').value = lines[0].substring(0, 50).trim(); document.getElementById('uIsim').classList.add('bg-purple-100', 'border-purple-500'); setTimeout(() => document.getElementById('uIsim').classList.remove('bg-purple-100', 'border-purple-500'), 1500); } else { alert(t('ocrFail')); }
            } catch (error) { console.error(error); }
            btn.innerHTML = `<span class="material-icons text-[14px] mr-1">auto_awesome</span> ${t('extractName')}`; btn.disabled = false;
        }

            let md = {}; try { md = JSON.parse(rawJson); } catch(e) { md = {}; }
            
            const modal = document.createElement('div'); modal.id = 'tempCostModal'; modal.className = "fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4";
            modal.innerHTML = `
                <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full border-t-4 border-blue-600">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-blue-800"><span class="material-icons mr-2">calculate</span> ${t('costDetail')}</h2>
                    <div class="space-y-3 mb-6">
                        <div class="flex justify-between items-center"><label class="text-sm font-bold text-slate-600">${t('costBase')}</label><input type="number" id="mHam" value="${md.ham || ''}" oninput="calcCostSum()" class="w-24 border p-1 rounded text-right"></div>
                        <div class="flex justify-between items-center"><label class="text-sm font-bold text-slate-600">${t('costShip')}</label><input type="number" id="mKargo" value="${md.kargo || ''}" oninput="calcCostSum()" class="w-24 border p-1 rounded text-right"></div>
                        <div class="flex justify-between items-center"><label class="text-sm font-bold text-slate-600">${t('costCustoms')}</label><input type="number" id="mGumruk" value="${md.gumruk || ''}" oninput="calcCostSum()" class="w-24 border p-1 rounded text-right"></div>
                        <div class="flex justify-between items-center"><label class="text-sm font-bold text-slate-600">${t('costLabor')}</label><input type="number" id="mIscilik" value="${md.iscilik || ''}" oninput="calcCostSum()" class="w-24 border p-1 rounded text-right"></div>
                        <div class="border-t pt-2 flex justify-between items-center mt-2"><label class="text-sm font-black text-blue-800">TOPLAM</label><span id="mToplamLabel" class="font-black text-lg text-blue-600">0.00</span></div>
                    </div>
                    <div class="flex gap-2"><button onclick="document.getElementById('tempCostModal').remove()" class="btn bg-slate-100 text-slate-700 w-full">${t('cancel')}</button><button onclick="saveCostModal()" class="btn bg-blue-600 text-white w-full shadow-lg">Uygula</button></div>
                </div>`;

        function calcCostSum() {
            let h = parseFloat(document.getElementById('mHam').value) || 0; let k = parseFloat(document.getElementById('mKargo').value) || 0;
            let g = parseFloat(document.getElementById('mGumruk').value) || 0; let i = parseFloat(document.getElementById('mIscilik').value) || 0;
            document.getElementById('mToplamLabel').innerText = (h + k + g + i).toFixed(2);
        }

        function saveCostModal() {
            let h = parseFloat(document.getElementById('mHam').value) || 0; let k = parseFloat(document.getElementById('mKargo').value) || 0;
            let g = parseFloat(document.getElementById('mGumruk').value) || 0; let i = parseFloat(document.getElementById('mIscilik').value) || 0;
            let total = h + k + g + i;
            
            let md = { ham: h, kargo: k, gumruk: g, iscilik: i };
            document.getElementById('uMaliyetJson').value = JSON.stringify(md);
            if(total > 0) document.getElementById('uAlis').value = total.toFixed(2);
            document.getElementById('tempCostModal').remove();
        }

        function previewPhoto(event) {
            const file = event.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('foto-preview').src = e.target.result; document.getElementById('uFotoBase64').value = e.target.result; document.getElementById('foto-preview-container').classList.remove('hidden'); }; reader.readAsDataURL(file);
        }
        function removePhoto() { document.getElementById('foto-preview').src = ""; document.getElementById('uFotoBase64').value = ""; document.getElementById('foto-preview-container').classList.add('hidden'); }

        async function kaydetUrun() {
            const skuVal = document.getElementById('uSku').value.trim(); if(!skuVal) return; const qrSafe = skuVal.startsWith("SKU-") ? skuVal : "SKU-" + skuVal;
            let eklenecekStok = parseInt(document.getElementById('uStok').value) || 0; let yeniSkt = document.getElementById('uSkt').value.trim();
            
            let vOran = parseFloat(document.getElementById('uVergiOrani').value) || 0;
            let mdJson = document.getElementById('uMaliyetJson').value; let md = {}; try{md=JSON.parse(mdJson);}catch(e){}

            const mevcutUrun = await db.urunler.where("sku").equals(skuVal).first();
            if (mevcutUrun) {
                let mevcutKoliler = mevcutUrun.koliler || []; mevcutKoliler.push({ miktar: eklenecekStok, skt: yeniSkt, tarih: new Date().toLocaleDateString() });
                let yeniToplamStok = mevcutUrun.stok + eklenecekStok; let yeniDurum = yeniToplamStok <= 0 ? 'Envanterde Değil' : 'Envanterde';
                await db.urunler.update(mevcutUrun.id, { stok: yeniToplamStok, durum: yeniDurum, koliler: mevcutKoliler });
                await db.hareketler.put({ id: generateId(), urunId: mevcutUrun.id, urunIsim: mevcutUrun.isim + " (Koli)", tip: 'Giriş', miktar: eklenecekStok, tarih: new Date().toLocaleString() });
            } else {
                let ilkKoli = []; if(eklenecekStok > 0 || yeniSkt) ilkKoli.push({ miktar: eklenecekStok, skt: yeniSkt, tarih: new Date().toLocaleDateString() });
                await db.urunler.put({ 
                    id: generateId(), katId: parseInt(document.getElementById('uKatId').value), isim: document.getElementById('uIsim').value, sku: skuVal, stok: eklenecekStok, skt: yeniSkt, adres: document.getElementById('uAdres').value, kritikSeviye: parseInt(document.getElementById('uKritik').value) || 0, qrData: qrSafe, isSet: document.getElementById('uIsSet').checked, setLinkleri: document.getElementById('uSetLinkleri').value, foto: document.getElementById('uFotoBase64').value, tel: document.getElementById('uTel').value, alis: document.getElementById('uAlis').value, satis: document.getElementById('uSatis').value, durum: document.getElementById('uDurum').value, vergi: document.getElementById('uVergi').checked, vergiOrani: vOran, maliyetDetay: md, aciklama: document.getElementById('uAciklama').value, koliler: ilkKoli
                });
            }
            triggerAutoSync(); renderEnvanter();
        }

        async function kaydetDuzenleme(id) {
            let vOran = parseFloat(document.getElementById('uVergiOrani').value) || 0;
            let mdJson = document.getElementById('uMaliyetJson').value; let md = {}; try{md=JSON.parse(mdJson);}catch(e){}

            await db.urunler.update(id, { isim: document.getElementById('uIsim').value, skt: document.getElementById('uSkt').value.trim(), adres: document.getElementById('uAdres').value, kritikSeviye: parseInt(document.getElementById('uKritik').value) || 0, isSet: document.getElementById('uIsSet').checked, setLinkleri: document.getElementById('uSetLinkleri').value, foto: document.getElementById('uFotoBase64').value, tel: document.getElementById('uTel').value, alis: document.getElementById('uAlis').value, satis: document.getElementById('uSatis').value, durum: document.getElementById('uDurum').value, vergi: document.getElementById('uVergi').checked, vergiOrani: vOran, maliyetDetay: md, aciklama: document.getElementById('uAciklama').value });
            triggerAutoSync(); renderEnvanter();
        }

}

            let taxStr = urun.vergi ? `<span class="bg-blue-100 text-blue-700 text-[10px] px-1 py-0.5 rounded ml-1">%${urun.vergiOrani || 20} KDV</span>` : '';

            document.getElementById('content').innerHTML = `

                    <div class="card mb-6 p-6">
                        <div class="flex flex-col md:flex-row items-center md:items-start justify-between mb-8 pb-6 border-b gap-4"><div class="flex items-center w-full md:w-auto">${urun.foto ? `<img src="${urun.foto}" class="w-24 h-24 object-cover rounded-xl shadow-md border mr-4">` : '<div class="w-24 h-24 bg-slate-100 rounded-xl border mr-4 flex items-center justify-center"><span class="material-icons text-slate-300 text-3xl">image</span></div>'}<div class="flex-1"><h2 class="text-3xl font-bold text-slate-800 mb-1 flex items-center flex-wrap">${urun.isim} ${urun.isSet ? `<span class="ml-2 bg-purple-100 text-purple-700 text-sm px-2 py-1 rounded-full">SET</span>` : ''}</h2><p class="text-slate-500 text-sm mt-1"><span class="material-icons text-sm mr-1">qr_code</span> ${urun.sku}</p><p class="text-slate-500 text-sm mt-1"><span class="material-icons text-sm mr-1">domain</span> ${lokasyonMetni}</p></div></div><div class="text-center bg-slate-50 p-4 rounded-xl border min-w-[120px] w-full md:w-auto shadow-sm"><p class="text-sm text-slate-500 font-bold mb-1">${t('currTot')}</p><div class="text-4xl font-black ${urun.stok <= urun.kritikSeviye ? 'text-red-600' : 'text-blue-600'}">${urun.stok}</div></div></div>

        async function stokIslemi(urunId, tip) {
            const miktar = parseInt(document.getElementById('islemMiktar').value); if(isNaN(miktar) || miktar <= 0) return;
            const urun = await db.urunler.get(urunId); let ns = tip === 'Giriş' ? urun.stok + miktar : urun.stok - miktar;
            if(tip === 'Çıkış' && ns < 0) return alert("Yetersiz stok!");
            let otoDurum = ns <= 0 ? 'Envanterde Değil' : 'Envanterde';
            await db.urunler.update(urunId, {stok: ns, durum: otoDurum});
            await db.hareketler.put({ id: generateId(), urunId: urun.id, urunIsim: urun.isim, tip: tip, miktar: miktar, tarih: new Date().toLocaleString() });
            triggerAutoSync(); showUrunDetay(urunId);
        }

        function disconnectNetwork() {
            if(peer) { peer.destroy(); peer = null; }
            connections = []; isHost = false; connectedPeersInfo = []; currentHostId = "";
            renderYedekleme(); updateSyncUI();
        }

        function saveDeviceName() {
            const val = document.getElementById('devNameInput').value.trim(); if(!val) return;
            myDeviceName = val; localStorage.setItem('stokpro_devicename', myDeviceName); renderYedekleme();
        }

        function resetDeviceName() {
            if(connections.length > 0) return alert("Ağa bağlıyken isim değiştiremezsiniz. Önce bağlantıyı kesin.");
            myDeviceName = ""; localStorage.removeItem('stokpro_devicename'); renderYedekleme();
        }

        function startHost() {
            if(!myDeviceName) return alert("Cihaz adı girmelisiniz!");
            if(peer) peer.destroy(); isHost = true; connections = []; connectedPeersInfo = []; currentHostId = "";
            const hostId = "stok-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('btnHost').innerHTML = 'Başlatılıyor...';
            peer = new Peer(hostId);
            peer.on('open', (id) => { 
                currentHostId = id; // Hata düzeltmesi: id globalde saklanır.
                renderYedekleme(); 
            });
            peer.on('connection', (conn) => { connections.push(conn); setupConnectionEvents(conn); updateSyncUI(); });
        }

        function connectToHost() {
            if(!myDeviceName) return alert("Cihaz adı girmelisiniz!");
            const tid = document.getElementById('syncInput').value.trim(); if(!tid) return;
            if(peer) peer.destroy(); isHost = false; connectedPeersInfo = []; currentHostId = "";
            document.getElementById('btnConn').innerHTML = 'Bağlanıyor...';
            peer = new Peer(); peer.on('open', () => { let conn = peer.connect(tid); connections = [conn]; setupConnectionEvents(conn); renderYedekleme(); });
        }

        function setupConnectionEvents(conn) {
            conn.syncStatus = 'ediliyor';
            
            conn.on('open', () => { 
                conn.send({ type: 'HANDSHAKE', name: myDeviceName });
                triggerAutoSync(); 
            });
            
            conn.on('data', async (data) => {
                if(data.type === 'HANDSHAKE') {
                    if(isHost && connections.length > 4) {
                        conn.send({ type: 'REJECT', msg: 'Maksimum 5 bilgisayar sınırına ulaşıldı!' }); setTimeout(() => conn.close(), 500); return;
                    }
                    conn.peerName = data.name; conn.syncStatus = 'ediliyor';
                    if(isHost) broadcastPeerList(); else updateSyncUI();
                }
                else if(data.type === 'REJECT') { alert(data.msg); disconnectNetwork(); }
                else if (data.type === 'PEER_LIST') {
                    connectedPeersInfo = data.peers; updateSyncUI();
                }
                else if(data.type === 'SYNC') {
                    try {
                        conn.syncStatus = 'ediliyor';
                        if(isHost) broadcastPeerList(); else updateSyncUI();

                        if(data.u && data.u.length) await db.urunler.bulkPut(data.u);
                        if(data.c && data.c.length) await db.kategoriler.bulkPut(data.c);
                        if(data.h && data.h.length) await db.hareketler.bulkPut(data.h);
                        if(data.g && data.g.length) await db.giderler.bulkPut(data.g);
                        
                        refreshCurrentView();
                        
                        conn.syncStatus = 'edildi';
                        conn.send({ type: 'SYNC_OK' }); 
                        
                        if (isHost) { 
                            broadcast({ type: 'SYNC', u: data.u, c: data.c, h: data.h, g: data.g }, conn.peer); 
                            broadcastPeerList();
                        } else { updateSyncUI(); }
                    } catch(e) {
                        conn.syncStatus = 'edilmedi'; conn.send({ type: 'SYNC_ERR' });
                        if(isHost) broadcastPeerList(); else updateSyncUI();
                    }
                }
                else if (data.type === 'SYNC_OK') {
                    conn.syncStatus = 'edildi'; if(isHost) broadcastPeerList(); else updateSyncUI();
                }
                else if (data.type === 'SYNC_ERR') {
                    conn.syncStatus = 'edilmedi'; if(isHost) broadcastPeerList(); else updateSyncUI();
                }
            });
            conn.on('close', () => { 
                connections = connections.filter(c => c.peer !== conn.peer); 
                updateSyncUI(); if(isHost) broadcastPeerList();
            });
        }

        function broadcastPeerList() {
            const peers = [{ name: myDeviceName + " (Sunucu)", status: 'edildi' }];
            connections.forEach(c => { if(c.open && c.peerName) { peers.push({ name: c.peerName, status: c.syncStatus || 'ediliyor' }); } });
            connectedPeersInfo = peers; broadcast({ type: 'PEER_LIST', peers: peers }); updateSyncUI();
        }

        async function triggerAutoSync() { 
            if(connections.length > 0) {
                connections.forEach(c => c.syncStatus = 'ediliyor');
                if(isHost) broadcastPeerList(); else updateSyncUI();

                const u = await db.urunler.toArray(); const c = await db.kategoriler.toArray(); const h = await db.hareketler.toArray(); const g = await db.giderler.toArray(); 
                broadcast({ type: 'SYNC', u, c, h, g }); 
            } 
        }

        function broadcast(data, excludePeerId = null) { connections.forEach(c => { if (c.open && c.peer !== excludePeerId) { c.send(data); } }); }
        
        function updateSyncUI() {
            if(!document.getElementById('syncStatusDiv')) return;
            const activeConnections = connections.filter(c => c.open).length;
            const menuBadge = document.getElementById('menuSyncCount');
            if(menuBadge) { if(activeConnections > 0) { menuBadge.innerText = activeConnections; menuBadge.classList.remove('hidden'); } else { menuBadge.classList.add('hidden'); } }
            
            const div = document.getElementById('syncStatusDiv'); 
            const btnConn = document.getElementById('btnConn'); 
            const devList = document.getElementById('connectedDevicesList');
            
            const statusColors = { 'ediliyor': 'bg-yellow-50 text-yellow-700 border-yellow-300', 'edildi': 'bg-emerald-50 text-emerald-700 border-emerald-300', 'edilmedi': 'bg-red-50 text-red-700 border-red-300' };
            const statusIcons = { 'ediliyor': 'sync', 'edildi': 'cloud_done', 'edilmedi': 'cloud_off' };
            const statusTexts = { 'ediliyor': t('syncing'), 'edildi': t('synced'), 'edilmedi': t('syncFailed') };

            let displayPeers = [];
            if (isHost) {
                displayPeers = [{name: myDeviceName + " (Sunucu)", status: 'edildi'}];
                connections.forEach(c => { if(c.open && c.peerName) displayPeers.push({name: c.peerName, status: c.syncStatus || 'ediliyor'}); });
            } else {
                displayPeers = connectedPeersInfo;
            }

            if(devList) {
                devList.innerHTML = displayPeers.map(p => `
                    <div class="flex items-center justify-between space-x-3 bg-white border p-2 px-3 rounded-lg shadow-sm min-w-[200px]">
                        <span class="font-bold text-slate-700 text-sm flex items-center"><span class="material-icons text-sm mr-2 text-indigo-500">computer</span>${p.name}</span>
                        <span class="text-[10px] px-2 py-1 rounded font-bold border flex items-center ${statusColors[p.status]} shadow-inner">
                            <span class="material-icons text-[12px] mr-1 ${p.status === 'ediliyor' ? 'animate-spin' : ''}">${statusIcons[p.status]}</span>
                            ${statusTexts[p.status]}
                        </span>
                    </div>
                `).join('');
            }

            if(activeConnections > 0) {
                if(btnConn && !isHost) btnConn.innerHTML = 'Bağlandı';
                div.className = "mt-4 p-4 rounded-lg text-center font-bold flex flex-col items-center justify-center bg-emerald-100 text-emerald-800 border border-emerald-300 shadow-inner";
                div.innerHTML = `<div class="flex items-center"><span class="material-icons mr-2 text-emerald-600">settings_input_antenna</span> ${t('connOk')} - Canlı Senkron Aktif (${displayPeers.length} / 5)</div>`;
            } else if (isHost) {
                div.className = "mt-4 p-4 rounded-lg text-center font-bold flex flex-col items-center justify-center bg-orange-100 text-orange-800 border border-orange-300 shadow-inner";
                div.innerHTML = `<div class="flex items-center"><span class="material-icons mr-2 text-orange-600">wifi_tethering</span> Ağ Açık, Bağlantı Bekleniyor...</div>`;
            } else {
                if(btnConn) btnConn.innerHTML = t('connHost');
                div.className = "mt-4 p-4 rounded-lg text-center font-bold flex flex-col items-center justify-center bg-slate-100 text-slate-500 border border-slate-300";
                div.innerHTML = `<div class="flex items-center"><span class="material-icons mr-2">sync_disabled</span> ${t('connNo')}</div>`;
                if(devList) devList.innerHTML = '';
            }
        }

        async function jsonYedekAl() {
            const data = { u: await db.urunler.toArray(), c: await db.kategoriler.toArray(), h: await db.hareketler.toArray(), g: await db.giderler.toArray(), v: 48 };
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });

            a.href = url; a.download = `StokPro_V48.1_TamYedek_${new Date().getTime()}.stokbak`;
            document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);

        async function excelSablonAl_ExcelJS() {
            try {
                const urunlerRaw = await db.urunler.toArray(); const kategoriler = await db.kategoriler.toArray(); 
                urunlerRaw.sort((a, b) => (a.isim || '').localeCompare(b.isim || ''));

                const excelData = urunlerRaw.map(u => {
                    const k = kategoriler.find(c => c.id === u.katId);
                    return { cat: k ? k.isim : '-', sku: u.sku, name: u.isim, stock: u.stok, buy: u.alis || 0, sell: u.satis || 0, taxRate: u.vergi ? u.vergiOrani : 0, exp: u.skt || '-', status: u.durum };
                });

                if(excelData.length === 0) return alert("Veri bulunamadı!");

                const workbook = new ExcelJS.Workbook(); const worksheet = workbook.addWorksheet('StokPro_DB');
                worksheet.columns = [ 
                    { header: t('colCat'), key: 'cat', width: 22 }, 
                    { header: t('colSku'), key: 'sku', width: 20 }, 
                    { header: t('colName'), key: 'name', width: 45 }, 
                    { header: t('colStock'), key: 'stock', width: 15 }, 
                    { header: t('colBuy'), key: 'buy', width: 18 }, 
                    { header: t('colSell'), key: 'sell', width: 18 }, 
                    { header: t('taxPercent'), key: 'taxRate', width: 15 }, 
                    { header: t('colExp'), key: 'exp', width: 15 }, 
                    { header: t('status'), key: 'status', width: 22 } 
                ];

                excelData.forEach(d => worksheet.addRow(d));

                // --- TABLO RENKLENDİRME VE SÜSLEME (YENİ) ---
                
                // Başlık Satırını (1. Satır) Şekillendir
                worksheet.getRow(1).eachCell((cell) => { 
                    cell.font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 12 }; 
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2563EB' } }; // Mavi Arka Plan
                    cell.border = { 
                        top: { style: 'medium', color: { argb: 'FF1E40AF' } },
                        bottom: { style: 'medium', color: { argb: 'FF1E40AF' } },
                        left: { style: 'thin', color: { argb: 'FF1E40AF' } },
                        right: { style: 'thin', color: { argb: 'FF1E40AF' } }
                    }; 
                    cell.alignment = { vertical: 'middle', horizontal: 'center' }; 
                });

                // Diğer satırları döngüye al (Zebra deseni ve Duruma göre renklendirme)
                worksheet.eachRow((row, rowNumber) => { 
                    if (rowNumber > 1) { 
                        const isEven = rowNumber % 2 === 0;
                        const rowBgColor = isEven ? 'FFF8FAFC' : 'FFFFFFFF'; // Açık Gri / Beyaz Zebra Desen
                        
                        row.eachCell((cell) => { 
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: rowBgColor } };
                            cell.border = { 
                                bottom: { style: 'thin', color: { argb: 'FFCBD5E1' } },
                                left: { style: 'thin', color: { argb: 'FFCBD5E1' } },
                                right: { style: 'thin', color: { argb: 'FFCBD5E1' } }
                            }; 
                            cell.alignment = { vertical: 'middle' }; 
                        }); 

                        // Stok Hücresi
                        const stockCell = row.getCell('stock');
                        stockCell.alignment = { vertical: 'middle', horizontal: 'center' }; 
                        stockCell.font = { bold: true };

                        // Durum Hücresine Göre Renk Ayarlama
                        const statusCell = row.getCell('status');
                        statusCell.alignment = { vertical: 'middle', horizontal: 'center' };
                        if (statusCell.value === 'Envanterde Değil' || statusCell.value === 'Out of Stock') {
                            statusCell.font = { color: { argb: 'FFDC2626' }, bold: true }; // Kırmızı Yazı
                        } else {
                            statusCell.font = { color: { argb: 'FF16A34A' }, bold: true }; // Yeşil Yazı
                        }
                    } 
                });
                
                worksheet.autoFilter = `A1:I${excelData.length + 1}`;
                const buffer = await workbook.xlsx.writeBuffer(); const blob = new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                const url = window.URL.createObjectURL(blob); const a = document.createElement("a"); 
                a.href = url; a.download = `StokPro_V48.1_RenkliRapor_${new Date().getTime()}.xlsx`; 
                document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            } catch (err) { alert("Excel Hatası: " + err); }
        }

        async function veriYukleGenel() {
            const file = document.getElementById('imp').files[0]; if(!file) return; const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'stokbak' || ext === 'json') {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result); 
                        if(parsed.u) await db.urunler.bulkPut(parsed.u); 
                        if(parsed.c) await db.kategoriler.bulkPut(parsed.c); 
                        if(parsed.h) await db.hareketler.bulkPut(parsed.h);
                        if(parsed.g) await db.giderler.bulkPut(parsed.g);
                        triggerAutoSync(); alert("Tam Geri Yükleme Başarılı!"); renderEnvanter();
                    } catch(err) { alert("Bozuk yedek dosyası!"); }
                }; reader.readAsText(file);
            } else if (ext === 'xlsx' || ext === 'xls') {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'}); const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
                        let kat = await db.kategoriler.where('isim').equals('Genel Envanter').first(); if (!kat) { await db.kategoriler.put({ id: generateId(), isim: 'Genel Envanter' }); kat = await db.kategoriler.where('isim').equals('Genel Envanter').first(); }
                        let uEkle = [];
                        for(let i of json) {
                            let isim = i[t('colName')] || i['Ürün İsmi'] || i['Product Name'] || i['Sales Description']; if(!isim || isim.toString().trim() === '') continue; 
                            let sku = i[t('colSku')] || i['Barkod/SKU'] || i['SKU'] || Math.floor(10000000 + Math.random() * 90000000).toString(); let stok = parseInt(i[t('colStock')] || i['Stok'] || i['Stock'] || i['ON HAND']) || 0; let durum = stok <= 0 ? 'Envanterde Değil' : 'Envanterde';
                            let vergiOraniExcel = parseFloat(i[t('taxPercent')] || i['Vergi Oranı (%)']) || 0;
                            let vergiVarMi = vergiOraniExcel > 0;
                            let mevcut = await db.urunler.where('sku').equals(sku).first();
                            if(mevcut) { mevcut.stok = stok; mevcut.durum = durum; mevcut.alis = i[t('colBuy')] || i['Alış'] || i['Buy Price'] || i['COST'] || mevcut.alis; mevcut.satis = i[t('colSell')] || i['Satış'] || i['Sell Price'] || i['SALES PRICE'] || mevcut.satis; uEkle.push(mevcut); } 
                            else { uEkle.push({ id: generateId(), katId: kat.id, isim: String(isim), sku: sku, stok: stok, skt: i[t('colExp')] || i['SKT'] || '', adres: 'Excel', kritikSeviye: 0, qrData: "SKU-"+sku, isSet: false, setLinkleri: '', foto: '', tel: '', alis: i[t('colBuy')] || 0, satis: i[t('colSell')] || 0, durum: durum, vergi: vergiVarMi, vergiOrani: vergiOraniExcel, maliyetDetay: {}, aciklama: '', koliler: [] }); }
                        }
                        if(uEkle.length) await db.urunler.bulkPut(uEkle); triggerAutoSync(); alert("Excel Verileri Senkronize Edildi!"); renderEnvanter();
                    } catch(err) { alert("Excel işlenemedi."); }
                }; reader.readAsArrayBuffer(file);
            }
        }

        async function refreshCurrentView() { const pageTitle = document.getElementById('pageTitle'); if(!pageTitle) { renderDashboard(); return; } const page = pageTitle.dataset.page; if(page === 'inv') await renderEnvanter(); if(page === 'dash') await renderDashboard(); if(page === 'cat') await renderKategoriler(); if(page === 'back') await renderYedekleme(); if(page === 'acc') await renderMuhasebe(); }
        async function sistemiSifirla() { const pass = prompt("Sistemi sıfırlamak için şifreyi girin (İpucu: 0000):"); if (pass === "0000") { if (confirm("Her şey silinecek. Emin misiniz?")) { await db.delete(); window.location.reload(); } } else if (pass !== null) { alert("Hatalı şifre!"); } }
        async function renderTarayici() { stopScanner(); document.getElementById('content').innerHTML = `<div class="max-w-xl mx-auto"><h2 class="text-3xl font-bold text-slate-800 mb-6 flex items-center justify-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> ${t('scan')}</h2><div class="card text-center p-8 bg-slate-900 border-0 shadow-2xl"><div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden mb-4 min-h-[300px]"></div><div id="result" class="mb-6 font-bold text-blue-400 h-6 animate-pulse">Kameraya tutun...</div><button onclick="renderDashboard()" class="btn bg-red-600 text-white w-full py-3 hover:bg-red-500 shadow-lg">Kamerayı Kapat</button></div></div>`; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } }, async (text) => { stopScanner(); document.getElementById('result').innerText = "Yönlendiriliyor..."; if (text.startsWith("cat_")) { showKategoriUrunleri(parseInt(text.replace("cat_", ""))); return; } let urun = await db.urunler.where("qrData").equals(text).first() || await db.urunler.where("sku").equals(text).first() || await db.urunler.where("sku").equals(text.replace("SKU-", "")).first(); if (urun) showUrunDetay(urun.id); else { alert("Sistemde bulunamadı:\n" + text); renderTarayici(); } }).catch(() => { document.getElementById('result').innerText = "Kamera erişim hatası!"; }); }

        updateSidebar(); renderDashboard();
    </script>
</body>
