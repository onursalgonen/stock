<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Stok Pro V.25 Modern - Onursal Gönen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @media print { 
            .no-print { display: none !important; } 
            .print-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; } 
            .qr-item { width: auto; text-align: center; font-size: 10px; border: 1px solid #000; padding: 10px; break-inside: avoid;} 
        }
        body { background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); padding: 1.5rem; border: 1px solid #e2e8f0; }
        .btn { transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex h-screen font-sans">
    
    <!-- Modern Sol Menü -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col no-print shadow-xl z-10">
        <div class="p-6 border-b border-slate-700 mb-4">
            <h1 class="font-bold text-2xl text-white tracking-wide">Stok<span class="text-blue-500">Pro</span></h1>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest">Onursal Gönen • V.25</p>
        </div>
        <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
            <button onclick="renderDashboard()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">dashboard</span> Dashboard</button>
            <button onclick="renderKategoriler()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">category</span> Kategoriler</button>
            <button onclick="renderEnvanter()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">inventory_2</span> Envanter</button>
            <button onclick="renderYedekleme()" class="w-full flex items-center p-3 hover:bg-slate-800 hover:text-white rounded-lg transition"><span class="material-icons mr-3">backup</span> Yedekleme</button>
            <div class="pt-4 mt-4 border-t border-slate-700">
                <button onclick="renderTarayici()" class="w-full flex items-center p-3 bg-blue-600 text-white hover:bg-blue-500 rounded-lg shadow-lg shadow-blue-900/20 transition"><span class="material-icons mr-3">qr_code_scanner</span> QR Kod Tara</button>
            </div>
        </nav>
    </aside>

    <!-- İçerik Alanı -->
    <main class="flex-1 p-8 overflow-y-auto relative" id="content"></main>

    <script>
        const db = new Dexie("StokPro_TamSurum");
        db.version(1).stores({ kategoriler: '++id, isim', urunler: '++id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData' });
        db.version(2).stores({ 
            kategoriler: '++id, isim', 
            urunler: '++id, katId, isim, sku, stok, skt, adres, kritikSeviye, qrData',
            hareketler: '++id, urunId, urunIsim, tip, miktar, tarih'
        });

        let html5QrCode = null;

        function stopScanner() {
            if (html5QrCode) {
                try { html5QrCode.stop().then(() => html5QrCode = null).catch(e => console.log(e)); } catch (e) {}
            }
        }

        // --- YARDIMCI FONKSİYON: Arka planda QR'ı Base64 Resme Çevirme ---
        function getQrBase64(text) {
            return new Promise(resolve => {
                if(!text) return resolve("");
                const div = document.createElement('div');
                new QRCode(div, { text: text, width: 128, height: 128 });
                setTimeout(() => {
                    const canvas = div.querySelector('canvas');
                    resolve(canvas ? canvas.toDataURL('image/png') : "");
                }, 50);
            });
        }

        // --- DASHBOARD (Stok Hareketleri Eklendi) ---
        async function renderDashboard() {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const hareketler = await db.hareketler.orderBy('id').reverse().limit(10).toArray(); 
            const kritikStok = urunler.filter(u => u.stok <= (u.kritikSeviye || 0));
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-bold text-slate-800">Genel Bakış</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="card border-l-4 border-blue-500 flex items-center">
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-full mr-4"><span class="material-icons text-3xl">inventory</span></div>
                        <div><p class="text-slate-500 font-medium">Toplam Ürün</p><h3 class="text-3xl font-bold text-slate-800">${urunler.length}</h3></div>
                    </div>
                    <div class="card border-l-4 border-red-500 flex items-center cursor-pointer" onclick="renderEnvanter()">
                        <div class="p-4 bg-red-50 text-red-600 rounded-full mr-4"><span class="material-icons text-3xl">warning</span></div>
                        <div><p class="text-slate-500 font-medium">Kritik Stok Uyarısı</p><h3 class="text-3xl font-bold text-red-600">${kritikStok.length}</h3></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="card">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-slate-400">history</span> Son Stok Hareketleri</h3>
                        ${hareketler.length === 0 ? '<p class="text-slate-500 text-sm italic">Henüz stok işlemi yapılmadı.</p>' : `
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead><tr class="text-slate-400 border-b"><th class="pb-2">Tarih</th><th class="pb-2">Ürün</th><th class="pb-2">İşlem</th><th class="pb-2">Miktar</th></tr></thead>
                                <tbody>
                                    ${hareketler.map(h => `
                                        <tr class="border-b last:border-0 hover:bg-slate-50">
                                            <td class="py-3 text-slate-500">${h.tarih}</td><td class="py-3 font-semibold text-slate-700">${h.urunIsim}</td>
                                            <td class="py-3"><span class="px-2 py-1 rounded text-xs font-bold ${h.tip === 'Giriş' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${h.tip === 'Giriş' ? '+ Giriş' : '- Çıkış'}</span></td>
                                            <td class="py-3 font-bold ${h.tip === 'Giriş' ? 'text-green-600' : 'text-red-600'}">${h.miktar}</td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`}
                    </div>
                    <div class="card bg-slate-50">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><span class="material-icons mr-2 text-yellow-500">notifications_active</span> Acil Durumlar</h3>
                        <div class="space-y-3 max-h-96 overflow-y-auto pr-2">
                            ${urunler.map(u => {
                                if(!u.skt) return '';
                                const fark = Math.round((new Date(u.skt) - new Date()) / 86400000);
                                if(fark < 0) return `<div class="p-3 bg-red-100 border border-red-200 text-red-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs">SKT GEÇTİ!</span></div><span class="material-icons">chevron_right</span></div>`;
                                if(fark <= 5) return `<div class="p-3 bg-yellow-100 border border-yellow-200 text-yellow-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs">SKT: ${fark} gün kaldı</span></div><span class="material-icons">chevron_right</span></div>`;
                                return '';
                            }).join('')}
                            ${kritikStok.map(u => `<div class="p-3 bg-orange-100 border border-orange-200 text-orange-800 rounded-lg flex items-center justify-between cursor-pointer shadow-sm" onclick="showUrunDetay(${u.id})"><div><b class="block">${u.isim}</b><span class="text-xs">Düşük Stok (Mevcut: ${u.stok})</span></div><span class="material-icons">chevron_right</span></div>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        // --- KATEGORİ MODÜLÜ ---
        async function renderKategoriler() {
            stopScanner();
            const cats = await db.kategoriler.toArray();
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8 no-print">
                    <h2 class="text-3xl font-bold text-slate-800">Kategoriler</h2>
                    <div class="space-x-2">
                        <button onclick="printKategoriler()" class="btn bg-slate-800 text-white hover:bg-slate-700"><span class="material-icons mr-2">print</span> QR Yazdır</button>
                        <button onclick="yeniKat()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-2">add</span> Yeni Kategori</button>
                    </div>
                </div>
                <div id="katGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 no-print"></div>`;
            
            setTimeout(() => {
                cats.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "card text-center hover:border-blue-300 transition duration-300 flex flex-col items-center";
                    div.innerHTML = `
                        <h3 class="font-bold text-lg text-slate-700 mb-4">${c.isim}</h3>
                        <div id="qr-kat-${c.id}" class="mb-6 p-2 bg-white border rounded"></div>
                        <div class="flex justify-center space-x-4 mt-auto w-full border-t pt-4">
                            <button onclick="showKategoriUrunleri(${c.id})" title="Ürünleri Gör" class="text-blue-500 hover:text-blue-700"><span class="material-icons">visibility</span></button>
                            <button onclick="duzenleKat(${c.id})" title="Düzenle" class="text-yellow-500 hover:text-yellow-600"><span class="material-icons">edit</span></button>
                            <button onclick="silKat(${c.id})" title="Sil" class="text-red-500 hover:text-red-700"><span class="material-icons">delete</span></button>
                        </div>`;
                    document.getElementById('katGrid').appendChild(div);
                    new QRCode(document.getElementById(`qr-kat-${c.id}`), {text: "cat_"+c.id, width: 80, height: 80});
                });
            }, 50);
        }
        async function yeniKat() { const isim = prompt("Kategori İsmi:"); if(isim) { await db.kategoriler.add({isim}); renderKategoriler(); } }
        async function duzenleKat(id) { const isim = prompt("Yeni İsim:"); if(isim) { await db.kategoriler.update(id, {isim}); renderKategoriler(); } }
        async function silKat(id) { if(confirm("Kategoriyi silmek istediğine emin misin?")) { await db.kategoriler.delete(id); renderKategoriler(); } }

        // --- KATEGORİ DETAY (Kategori Okutulduğunda Açılır) ---
        async function showKategoriUrunleri(katId) {
            stopScanner();
            const kat = await db.kategoriler.get(katId);
            if(!kat) return alert("Kategori bulunamadı!");
            const urunler = await db.urunler.where({katId: katId}).toArray();
            
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-6">
                    <button onclick="renderKategoriler()" class="mr-4 text-slate-500 hover:text-blue-600"><span class="material-icons text-3xl">arrow_back</span></button>
                    <h2 class="text-2xl font-bold text-slate-800">📂 ${kat.isim} İçerisindeki Ürünler</h2>
                </div>
                <div class="card overflow-hidden">
                    ${urunler.length === 0 ? '<p class="text-slate-500 p-4">Bu kategoride henüz ürün yok.</p>' : `
                    <table class="w-full text-left">
                        <thead><tr class="bg-slate-50 text-slate-500"><th class="p-4 rounded-tl-lg">İsim</th><th class="p-4">Stok</th><th class="p-4 rounded-tr-lg">Hızlı İşlem</th></tr></thead>
                        <tbody>
                            ${urunler.map(u => `
                                <tr class="border-t hover:bg-slate-50">
                                    <td class="p-4 font-semibold">${u.isim}</td>
                                    <td class="p-4 text-lg font-bold ${u.stok <= u.kritikSeviye ? 'text-red-600' : 'text-slate-700'}">${u.stok}</td>
                                    <td class="p-4">
                                        <button onclick="showUrunDetay(${u.id})" class="btn bg-blue-100 text-blue-700 hover:bg-blue-200 py-1 px-3 text-sm">Stok Güncelle</button>
                                        <button onclick="showUrunForm(${u.id})" class="btn bg-slate-100 text-slate-700 hover:bg-slate-200 py-1 px-3 text-sm ml-2">Düzenle</button>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>`}
                </div>`;
        }

        // --- ÜRÜN DETAY / STOK GİRİŞ-ÇIKIŞ (Ürün Okutulduğunda Açılır) ---
        async function showUrunDetay(urunId) {
            stopScanner();
            const urun = await db.urunler.get(urunId);
            if(!urun) return alert("Ürün bulunamadı!");
            
            document.getElementById('content').innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="renderEnvanter()" class="text-slate-500 hover:text-blue-600 flex items-center"><span class="material-icons mr-1">arrow_back</span> Geri Dön</button>
                        <button onclick="showUrunForm(${urun.id})" class="text-yellow-600 hover:text-yellow-700 flex items-center"><span class="material-icons mr-1">edit</span> Ürünü Düzenle</button>
                    </div>
                    <div class="card mb-6">
                        <div class="flex items-center justify-between mb-6 pb-6 border-b">
                            <div>
                                <h2 class="text-3xl font-bold text-slate-800 mb-1">${urun.isim}</h2>
                                <p class="text-slate-500">SKU: ${urun.sku} | Raf: ${urun.adres || 'Belirtilmedi'}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-sm text-slate-500 font-bold mb-1">Mevcut Stok</p>
                                <div class="text-5xl font-black ${urun.stok <= urun.kritikSeviye ? 'text-red-600' : 'text-slate-800'}">${urun.stok}</div>
                            </div>
                        </div>
                        <h3 class="text-lg font-bold text-slate-700 mb-4">Hızlı Stok İşlemi</h3>
                        <div class="flex items-center space-x-4 bg-slate-50 p-4 rounded-xl border">
                            <input type="number" id="islemMiktar" placeholder="Miktar girin..." min="1" class="flex-1 p-3 border rounded-lg text-lg font-bold text-center outline-blue-500" value="1">
                            <button onclick="stokIslemi(${urun.id}, 'Giriş')" class="btn bg-green-600 text-white hover:bg-green-500 px-6 py-3"><span class="material-icons mr-2">add_circle</span> GİRİŞ YAP</button>
                            <button onclick="stokIslemi(${urun.id}, 'Çıkış')" class="btn bg-red-600 text-white hover:bg-red-500 px-6 py-3"><span class="material-icons mr-2">remove_circle</span> ÇIKIŞ YAP</button>
                        </div>
                    </div>
                </div>`;
        }

        async function stokIslemi(urunId, tip) {
            const miktarInput = document.getElementById('islemMiktar').value;
            const miktar = parseInt(miktarInput);
            if(isNaN(miktar) || miktar <= 0) return alert("Lütfen geçerli bir miktar girin!");
            
            const urun = await db.urunler.get(urunId);
            let yeniStok = urun.stok;
            if(tip === 'Giriş') yeniStok += miktar;
            if(tip === 'Çıkış') { if(urun.stok < miktar) return alert("Mevcut stoktan fazlasını çıkaramazsınız!"); yeniStok -= miktar; }

            await db.urunler.update(urunId, {stok: yeniStok});
            await db.hareketler.add({ urunId: urun.id, urunIsim: urun.isim, tip: tip, miktar: miktar, tarih: new Date().toLocaleString('tr-TR') });
            showUrunDetay(urunId);
        }

        // --- ENVANTER (ÜRÜNLER LİSTESİ) ---
        async function renderEnvanter(filtre = "") {
            stopScanner();
            const urunler = await db.urunler.toArray();
            const liste = urunler.filter(u => u.isim.toLowerCase().includes(filtre.toLowerCase()));
            
            document.getElementById('content').innerHTML = `
                <div class="flex justify-between items-center mb-8 no-print">
                    <h2 class="text-3xl font-bold text-slate-800">Envanter</h2>
                    <div class="space-x-2">
                        <button onclick="printUrunler()" class="btn bg-slate-800 text-white hover:bg-slate-700"><span class="material-icons mr-2">print</span> Tüm QR Yazdır</button>
                        <button onclick="showUrunForm()" class="btn bg-blue-600 text-white hover:bg-blue-500"><span class="material-icons mr-2">add</span> Yeni Ürün</button>
                    </div>
                </div>
                
                <div class="card overflow-hidden no-print">
                    <div class="mb-4 relative">
                        <span class="material-icons absolute left-3 top-3 text-slate-400">search</span>
                        <input oninput="renderEnvanter(this.value)" placeholder="Ürün Ara..." class="w-full md:w-1/3 pl-10 pr-4 py-3 border rounded-lg outline-blue-500 bg-slate-50" value="${filtre}">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="bg-slate-100 text-slate-500 uppercase text-xs tracking-wider"><th class="p-4 rounded-tl-lg">QR</th><th class="p-4">İsim / SKU</th><th class="p-4 text-center">Stok</th><th class="p-4">SKT</th><th class="p-4 text-right rounded-tr-lg">İşlemler</th></tr></thead>
                            <tbody>
                                ${liste.map(u => `
                                    <tr class="border-b last:border-0 hover:bg-slate-50 transition">
                                        <td class="p-4 w-16"><div id="qr-urun-${u.id}" class="bg-white p-1 border rounded inline-block"></div></td>
                                        <td class="p-4 cursor-pointer" onclick="showUrunDetay(${u.id})"><p class="font-bold text-slate-800 text-base">${u.isim}</p><p class="text-xs text-slate-400">SKU: ${u.sku}</p></td>
                                        <td class="p-4 text-center"><span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${u.stok <= u.kritikSeviye ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-700'}">${u.stok}</span></td>
                                        <td class="p-4 text-sm text-slate-600">${u.skt || '-'}</td>
                                        <td class="p-4 text-right space-x-1">
                                            <button onclick="showUrunDetay(${u.id})" title="Stok İşlemi" class="btn bg-green-50 text-green-600 hover:bg-green-100 p-2"><span class="material-icons">sync_alt</span></button>
                                            <button onclick="showUrunForm(${u.id})" title="Düzenle" class="btn bg-blue-50 text-blue-600 hover:bg-blue-100 p-2"><span class="material-icons">edit</span></button>
                                            <button onclick="silUrun(${u.id})" title="Sil" class="btn bg-red-50 text-red-600 hover:bg-red-100 p-2"><span class="material-icons">delete</span></button>
                                        </td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            
            // GÜVENLİ QR OLUŞTURMA: u.qrData boş olsa bile çalışır
            setTimeout(() => {
                liste.forEach(u => {
                    const el = document.getElementById(`qr-urun-${u.id}`);
                    if(el) {
                        const qText = u.qrData || "SKU-" + (u.sku || "BOŞ");
                        new QRCode(el, {text: qText, width: 40, height: 40});
                    }
                });
            }, 100);
        }
        async function silUrun(id) { if(confirm("Ürünü silmek istediğine emin misin?")) { await db.urunler.delete(id); renderEnvanter(); } }

        // --- ÜRÜN EKLE/DÜZENLE FORMU ---
        async function showUrunForm(id = null) {
            stopScanner();
            const u = id ? await db.urunler.get(id) : {isim: '', sku: '', stok: 0, skt: '', adres: '', kritikSeviye: 0};
            const cats = await db.kategoriler.toArray();
            
            document.getElementById('content').innerHTML = `
                <div class="card max-w-xl mx-auto shadow-xl border-t-4 border-blue-500 no-print">
                    <h2 class="text-2xl font-bold mb-6 text-slate-800 flex items-center">${id ? '<span class="material-icons mr-2 text-yellow-500">edit</span> Ürün Düzenle' : '<span class="material-icons mr-2 text-blue-500">add_box</span> Yeni Ürün'}</h2>
                    
                    <div class="flex justify-center mb-6">
                        <div id="qr-preview" class="border-2 border-dashed border-slate-300 p-4 rounded-xl bg-slate-50 min-h-[120px] min-w-[120px] flex items-center justify-center">
                            <span class="text-slate-400 text-sm">QR Önizleme</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">📂 Kategori</label>
                            <select id="uKatId" class="w-full border-slate-300 border p-3 rounded-lg bg-slate-50 focus:bg-white transition">${cats.map(c => `<option value="${c.id}" ${u.katId==c.id?'selected':''}>${c.isim}</option>`).join('')}</select>
                        </div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">🏷️ Ürün İsmi</label>
                            <input id="uIsim" value="${u.isim}" class="w-full border-slate-300 border p-3 rounded-lg bg-slate-50 focus:bg-white transition">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-slate-600 mb-1">📦 Başlangıç Stoğu</label>
                                <input id="uStok" type="number" value="${u.stok}" ${id ? 'disabled title="Stok miktarını Hızlı İşlem menüsünden değiştirin"' : ''} class="w-full border-slate-300 border p-3 rounded-lg ${id ? 'bg-slate-200 cursor-not-allowed' : 'bg-slate-50'}">
                            </div>
                            <div><label class="block text-sm font-bold text-slate-600 mb-1">🔢 SKU</label>
                                <input id="uSku" value="${u.sku}" ${id?'disabled':''} oninput="updateQrPreview(this.value)" class="w-full border-slate-300 border p-3 rounded-lg ${id ? 'bg-slate-200 cursor-not-allowed' : 'bg-slate-50 focus:bg-white'}">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold text-slate-600 mb-1">📅 SKT Tarihi</label>
                                <input id="uSkt" type="date" value="${u.skt}" class="w-full border-slate-300 border p-3 rounded-lg bg-slate-50 focus:bg-white transition">
                            </div>
                            <div><label class="block text-sm font-bold text-slate-600 mb-1">⚠️ Kritik Stok Eşiği</label>
                                <input id="uKritik" type="number" value="${u.kritikSeviye || 0}" class="w-full border-slate-300 border p-3 rounded-lg bg-slate-50 focus:bg-white transition">
                            </div>
                        </div>
                        <div><label class="block text-sm font-bold text-slate-600 mb-1">📍 Adres / Raf</label>
                            <input id="uAdres" value="${u.adres || ''}" class="w-full border-slate-300 border p-3 rounded-lg bg-slate-50 focus:bg-white transition">
                        </div>
                    </div>
                    <div class="flex gap-4 mt-8 pt-6 border-t">
                        <button onclick="renderEnvanter()" class="btn bg-slate-200 text-slate-700 hover:bg-slate-300 w-full">İptal</button>
                        <button onclick="${id ? `kaydetDuzenleme(${id})` : 'kaydetUrun()'}" class="btn bg-blue-600 text-white hover:bg-blue-500 w-full shadow-lg shadow-blue-500/30">
                            ${id ? 'Güncelle' : 'Kaydet'}
                        </button>
                    </div>
                </div>`;
            if(u.sku) updateQrPreview(u.sku);
        }

        function updateQrPreview(sku) {
            const preview = document.getElementById('qr-preview');
            preview.innerHTML = "";
            if(sku) new QRCode(preview, {text: "SKU-" + sku, width: 120, height: 120});
        }

        async function kaydetUrun() {
            const sku = document.getElementById('uSku').value;
            if(!sku) return alert("SKU Girmelisiniz!");
            await db.urunler.add({ katId: parseInt(document.getElementById('uKatId').value), isim: document.getElementById('uIsim').value, sku: sku, stok: parseInt(document.getElementById('uStok').value), skt: document.getElementById('uSkt').value, adres: document.getElementById('uAdres').value, kritikSeviye: parseInt(document.getElementById('uKritik').value), qrData: "SKU-"+sku });
            renderEnvanter();
        }

        async function kaydetDuzenleme(id) {
            await db.urunler.update(id, { isim: document.getElementById('uIsim').value, skt: document.getElementById('uSkt').value, adres: document.getElementById('uAdres').value, kritikSeviye: parseInt(document.getElementById('uKritik').value) });
            renderEnvanter();
        }

        // --- AKILLI KAMERA / QR TARAMA MODÜLÜ ---
        async function renderTarayici() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="max-w-xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-slate-800 flex items-center"><span class="material-icons mr-2 text-blue-600">qr_code_scanner</span> QR Kod Okuyucu</h2>
                    </div>
                    <div class="card text-center p-8">
                        <p class="text-slate-500 mb-6 font-medium">Kategori veya Ürün QR Kodunu kameraya gösterin.</p>
                        <div id="reader" class="w-full max-w-md mx-auto rounded-xl overflow-hidden shadow-inner border-2 border-slate-200 mb-4 bg-slate-900 min-h-[300px]"></div>
                        <div id="result" class="mb-6 font-bold text-blue-600 h-6 animate-pulse">Kamera başlatılıyor...</div>
                        <button onclick="renderDashboard()" class="btn bg-red-100 text-red-600 hover:bg-red-200 w-full py-3"><span class="material-icons mr-2">cancel</span> Taramayı İptal Et</button>
                    </div>
                </div>`;
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (decodedText) => {
                    stopScanner(); 
                    document.getElementById('result').innerText = "Okundu, yönlendiriliyor...";
                    document.getElementById('result').classList.remove('animate-pulse');
                    if (decodedText.startsWith("SKU-")) {
                        const skuStr = decodedText.replace("SKU-", "");
                        const urun = await db.urunler.where("sku").equals(skuStr).first();
                        if (urun) showUrunDetay(urun.id); 
                        else { alert("Veritabanında bu SKU'ya ait ürün bulunamadı!"); renderTarayici(); }
                    } else if (decodedText.startsWith("cat_")) {
                        const katIdStr = decodedText.replace("cat_", "");
                        showKategoriUrunleri(parseInt(katIdStr)); 
                    } else { alert("Sistemde tanınmayan QR formatı!"); renderTarayici(); }
                }
            ).catch(err => {
                document.getElementById('result').innerText = "Kamera erişim hatası! (Kamera izni verilmeli)";
                document.getElementById('result').classList.replace('text-blue-600', 'text-red-600');
                document.getElementById('result').classList.remove('animate-pulse');
            });
        }

        // --- YAZDIRMA ---
        async function printKategoriler() {
            const cats = await db.kategoriler.toArray();
            document.getElementById('content').innerHTML = `<div class="print-grid" id="printArea">${cats.map(c => `<div class="qr-item"><div id="pq-${c.id}" style="display:flex; justify-content:center;"></div><p class="mt-2 font-bold text-lg">${c.isim}</p></div>`).join('')}</div>`;
            setTimeout(() => {
                cats.forEach(c => new QRCode(document.getElementById(`pq-${c.id}`), {text: "cat_"+c.id, width: 100, height: 100}));
                setTimeout(() => { window.print(); renderKategoriler(); }, 800); 
            }, 100);
        }

        async function printUrunler() {
            const urunler = await db.urunler.toArray();
            document.getElementById('content').innerHTML = `<div class="print-grid" id="printArea">${urunler.map(u => `<div class="qr-item"><div id="pq-${u.id}" style="display:flex; justify-content:center;"></div><p class="mt-2 font-bold text-sm">${u.isim}</p><p class="text-xs">SKU:${u.sku}</p></div>`).join('')}</div>`;
            setTimeout(() => {
                urunler.forEach(u => new QRCode(document.getElementById(`pq-${u.id}`), {text: u.qrData || "SKU-"+(u.sku || "BOŞ"), width: 80, height: 80}));
                setTimeout(() => { window.print(); renderEnvanter(); }, 800); 
            }, 100);
        }

        // --- YEDEKLEME ---
        async function renderYedekleme() {
            stopScanner();
            document.getElementById('content').innerHTML = `
                <div class="flex items-center mb-8"><h2 class="text-3xl font-bold text-slate-800">Yedekleme Merkezi</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl no-print">
                    <div class="card border-t-4 border-blue-500">
                        <div class="flex items-center mb-4"><span class="material-icons text-blue-500 text-3xl mr-3">cloud_download</span><h3 class="font-bold text-xl text-slate-700">Dışa Aktar</h3></div>
                        <p class="text-slate-500 mb-6">Tüm verilerinizi (Base64 kodlu QR resimleriyle birlikte) Excel dosyası olarak güvenle indirin.</p>
                        <button id="btnYedekAl" onclick="yedekAl()" class="btn bg-blue-600 text-white hover:bg-blue-500 w-full py-3 shadow-lg"><span class="material-icons mr-2">download</span> Excel Olarak İndir</button>
                    </div>
                    <div class="card border-t-4 border-green-500">
                        <div class="flex items-center mb-4"><span class="material-icons text-green-500 text-3xl mr-3">cloud_upload</span><h3 class="font-bold text-xl text-slate-700">İçe Aktar (Kurtarma)</h3></div>
                        <p class="text-slate-500 mb-6">Daha önce aldığınız yedek dosyasını yükleyerek sisteminizi tam olarak eski haline getirin.</p>
                        <input type="file" id="imp" class="mb-4 block w-full text-sm border p-3 rounded-lg bg-slate-50">
                        <button onclick="yedekYukle()" class="btn bg-green-600 text-white hover:bg-green-500 w-full py-3 shadow-lg"><span class="material-icons mr-2">upload</span> Dosyayı Yükle</button>
                    </div>
                </div>`;
        }

        async function yedekAl() {
            const btn = document.getElementById('btnYedekAl');
            btn.innerHTML = '<span class="material-icons animate-spin mr-2">refresh</span> Hazırlanıyor...';
            btn.disabled = true;

            const u = await db.urunler.toArray(); 
            const c = await db.kategoriler.toArray(); 
            const h = await db.hareketler.toArray();
            
            // Tüm Qr kodları arka planda base64'e çevirip objelere gömüyoruz
            for(let item of u) { item.tip = 'urun'; item.qrBase64 = await getQrBase64(item.qrData || "SKU-" + (item.sku||"X")); }
            for(let item of c) { item.tip = 'kategori'; item.qrBase64 = await getQrBase64("cat_" + item.id); }
            for(let item of h) { item.tip = 'hareket'; }

            const data = [...u, ...c, ...h];
            if(data.length === 0) {
                renderYedekleme();
                return alert("Yedeklenecek veri bulunamadı!");
            }
            
            const wb = XLSX.utils.book_new(); 
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), "StokYedek");
            XLSX.writeFile(wb, "StokPro_Tam_Yedek_Base64.xlsx");
            renderYedekleme(); // İşlem bitince ekranı tazele
        }

        async function yedekYukle() {
            const file = document.getElementById('imp').files[0];
            if(!file) return alert("Lütfen bir dosya seçin!");
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[0]);
                    let uSay=0, kSay=0, hSay=0;
                    
                    // .put kullanıyoruz ki çakışma yaşanmasın, aynı id üzerine direkt yazsın
                    for(let i of json) {
                        if(i.tip === 'urun') { delete i.tip; delete i.qrBase64; await db.urunler.put(i); uSay++; }
                        else if(i.tip === 'kategori') { delete i.tip; delete i.qrBase64; await db.kategoriler.put(i); kSay++; }
                        else if(i.tip === 'hareket') { delete i.tip; await db.hareketler.put(i); hSay++; }
                    }
                    alert(`Geri Yükleme Başarılı!\n${uSay} Ürün, ${kSay} Kategori, ${hSay} Hareket sisteme işlendi.`); 
                    renderEnvanter();
                } catch(err) { alert("Hata! Yedek dosyası bozuk veya format uyumsuz."); }
            }; reader.readAsArrayBuffer(file);
        }

        renderDashboard();
    </script>
</body>
</html>
